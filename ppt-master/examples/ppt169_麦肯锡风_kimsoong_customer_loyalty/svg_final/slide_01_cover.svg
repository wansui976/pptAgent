  <line x1="80" y1="63" x2="560" y2="63" stroke="#FFFFFF" stroke-width="0.5" stroke-opacity="0.20" />
  <text font-weight="bold" font-family="Arial, sans-serif" fill="#FFFFFF" font-size="46" x="80" y="148">Kimsoong Customer</text><text font-weight="bold" font-family="Arial, sans-serif" fill="#FFFFFF" font-size="46" x="80" y="206">Loyalty Programme</text><rect x="80" y="218" width="54" height="3" rx="1" fill="url(#accentL)" />
  <text x="80" y="236" font-family="Arial, sans-serif" font-size="18" fill="#FFFFFF" fill-opacity="0.78">Strategic Framework for Customer Retention  ·  European Market</text>
  <text x="80" y="350" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" letter-spacing="3">PROJECT DETAILS</text>
  <line x1="80" y1="361" x2="618" y2="361" stroke="#E2E8F0" stroke-width="1" />
  <rect x="80" y="374" width="4" height="118" rx="2" fill="#005587" />
  <text x="100" y="399" font-family="Arial, sans-serif" font-size="13" fill="#0F172A" font-weight="bold">Client</text>
  <text x="196" y="399" font-family="Arial, sans-serif" font-size="13" fill="#475569">Kimsoong European Headquarters, Paris</text>
  <text x="100" y="427" font-family="Arial, sans-serif" font-size="13" fill="#0F172A" font-weight="bold">Date</text>
  <text x="196" y="427" font-family="Arial, sans-serif" font-size="13" fill="#475569">November 2025  |  Ref: KIMEU-2025-CL01</text>
  <text x="100" y="455" font-family="Arial, sans-serif" font-size="13" fill="#0F172A" font-weight="bold">Scope</text>
  <text x="196" y="455" font-family="Arial, sans-serif" font-size="13" fill="#475569">Customer loyalty programme — European franchise network</text>
  <text x="100" y="483" font-family="Arial, sans-serif" font-size="13" fill="#0F172A" font-weight="bold">Cost model</text>
  <text x="230" y="483" font-family="Arial, sans-serif" font-size="13" fill="#475569">50/50 split — Head Office and European franchises</text>
