<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="coverGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#001B35" />
      <stop offset="55%" stop-color="#00387A" />
      <stop offset="100%" stop-color="#0063A8" />
    </linearGradient>
    <linearGradient id="accentL" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#0EA5E9" />
    </linearGradient>
    <filter id="cs" x="-10%" y="-10%" width="130%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="13" />
      <feOffset dx="0" dy="7" result="ob" />
      <feFlood flood-color="#000000" flood-opacity="0.09" result="sc" />
      <feComposite in="sc" in2="ob" operator="in" result="s" />
      <feMerge><feMergeNode in="s" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="#FFFFFF" />
