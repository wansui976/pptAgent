  <text x="784" y="460" font-family="Arial, sans-serif" font-size="12" fill="#94A3B8">Only 1 in 7 buyers ever returns</text>
  <line x1="784" y1="474" x2="972" y2="474" stroke="#F1F5F9" stroke-width="1" />
  <text x="784" y="494" font-family="Arial, sans-serif" font-size="12" fill="#DC2626" font-weight="bold">Target: 30% by Q4 2026</text>
  <text x="784" y="512" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Double retention within 12 months</text>
  <text x="784" y="544" font-family="Arial, sans-serif" font-size="10" fill="#059669" font-weight="bold">78% of losses are controllable</text>
  <rect x="1002" y="328" width="228" height="230" rx="4" fill="#FFFFFF" filter="url(#cs)" />
  <rect x="1002" y="328" width="228" height="5" rx="4" fill="#F59E0B" />
  <rect x="1002" y="328" width="5" height="230" rx="2" fill="#F59E0B" />
  <text x="1030" y="364" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" letter-spacing="2">CONTROLLABLE LOSS DRIVERS</text>
  <text x="1030" y="420" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#F59E0B">52%</text>
  <text x="1030" y="446" font-family="Arial, sans-serif" font-size="12" fill="#94A3B8">switched to competitor</text>
  <text x="1030" y="475" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#F59E0B">26%</text>
  <text x="1030" y="501" font-family="Arial, sans-serif" font-size="12" fill="#94A3B8">cited service failure</text>
  <line x1="1030" y1="515" x2="1218" y2="515" stroke="#F1F5F9" stroke-width="1" />
  <text x="1030" y="535" font-family="Arial, sans-serif" font-size="12" fill="#F59E0B" font-weight="bold">= 78% controllable total</text>
  <text x="1030" y="553" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8">Both directly addressable</text>
  <rect x="0" y="694" width="1280" height="26" fill="#F8FAFC" />
  <line x1="0" y1="694" x2="1280" y2="694" stroke="#E2E8F0" stroke-width="1" />
  <text x="40" y="711" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8">Source: Kimsoong Customer Loyalty Programme Brief</text>
  <text x="640" y="711" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">STRICTLY CONFIDENTIAL  |  NOT FOR DISTRIBUTION</text>
  <text x="1240" y="711" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" text-anchor="end">1</text>
