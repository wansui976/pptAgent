<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="topGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#002A50"/>
      <stop offset="100%" stop-color="#0070C0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="5" result="ob"/>
      <feFlood flood-color="#000000" flood-opacity="0.11" result="sc"/>
      <feComposite in="sc" in2="ob" operator="in" result="s"/>
      <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="deepShadow" x="-10%" y="-10%" width="130%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="7" result="ob"/>
      <feFlood flood-color="#000000" flood-opacity="0.14" result="sc"/>
      <feComposite in="sc" in2="ob" operator="in" result="s"/>
      <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bubbleShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="3" result="ob"/>
      <feFlood flood-color="#000000" flood-opacity="0.20" result="sc"/>
      <feComposite in="sc" in2="ob" operator="in" result="s"/>
      <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1280" height="6" fill="url(#topGrad)"/>
  <text x="40" y="44" font-family="Arial, sans-serif" font-size="19" font-weight="bold" fill="#0F172A">52% switch to competitors, 26% cite service failure — 78% of all customer loss is directly controllable</text>
  <rect x="40" y="56" width="1200" height="44" rx="2" fill="#18345E"/>
  <rect x="40" y="56" width="5" height="44" rx="2" fill="#38BDF8"/>
  <text x="57" y="83" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#F8FAFC">Competitive switching and service disappointment are the twin root causes; targeting both can recover the vast majority of lapsed customers</text>
  <!-- Section header -->
  <text x="40" y="124" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" letter-spacing="3">WHY CUSTOMERS DO NOT RETURN  (% of non-returning customers,  n = post-purchase survey)</text>
  <!-- Y-axis line -->
  <line x1="286" y1="134" x2="286" y2="555" stroke="#E2E8F0" stroke-width="1.5"/>
  <!-- X-axis reference lines (25%, 50%) -->
  <line x1="443" y1="134" x2="443" y2="555" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="596" y1="134" x2="596" y2="555" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="749" y1="134" x2="749" y2="555" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- X-axis value labels -->
  <text x="286" y="574" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">0%</text>
  <text x="443" y="574" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">25%</text>
  <text x="596" y="574" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">50%</text>
  <text x="749" y="574" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">75%</text>
  <!-- ── ROW 1: Competitor switch 52% (RED — controllable) ── -->
  <rect x="40" y="140" width="238" height="68" rx="3" fill="#FEF2F2" fill-opacity="0.60"/>
  <text x="274" y="162" font-family="Arial, sans-serif" font-size="13" fill="#1E293B" font-weight="bold" text-anchor="end">Competitor switch</text>
  <text x="274" y="178" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" text-anchor="end">Bought a competing model</text>
  <rect x="290" y="143" width="612" height="36" rx="3" fill="#FEE2E2"/>
  <rect x="290" y="143" width="318" height="36" rx="3" fill="#DC2626"/>
  <text x="598" y="166" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="end">52%</text>
  <rect x="618" y="149" width="140" height="24" rx="3" fill="#DC2626" fill-opacity="0.10"/>
  <text x="626" y="158" font-family="Arial, sans-serif" font-size="9" fill="#DC2626" font-weight="bold">CONTROLLABLE</text>
  <text x="626" y="169" font-family="Arial, sans-serif" font-size="10" fill="#B91C1C">→ Loyalty discount</text>
  <!-- ── ROW 2: Service failure 26% (AMBER — controllable) ── -->
  <rect x="40" y="218" width="238" height="68" rx="3" fill="#FFFBEB" fill-opacity="0.60"/>
  <text x="274" y="240" font-family="Arial, sans-serif" font-size="13" fill="#1E293B" font-weight="bold" text-anchor="end">Service failure</text>
  <text x="274" y="256" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" text-anchor="end">Disappointed with after-sales</text>
  <rect x="290" y="221" width="612" height="36" rx="3" fill="#FEF3C7"/>
  <rect x="290" y="221" width="159" height="36" rx="3" fill="#F59E0B"/>
  <text x="439" y="244" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E293B" text-anchor="end">26%</text>
  <rect x="459" y="227" width="144" height="24" rx="3" fill="#F59E0B" fill-opacity="0.12"/>
  <text x="467" y="236" font-family="Arial, sans-serif" font-size="9" fill="#F59E0B" font-weight="bold">CONTROLLABLE</text>
  <text x="467" y="247" font-family="Arial, sans-serif" font-size="10" fill="#92400E">→ Free 3-yr service</text>
  <!-- 78% bracket annotation -->
  <line x1="40" y1="296" x2="40" y2="204" stroke="#DC2626" stroke-width="1.5"/>
  <line x1="40" y1="204" x2="52" y2="204" stroke="#DC2626" stroke-width="1.5"/>
  <line x1="40" y1="296" x2="52" y2="296" stroke="#DC2626" stroke-width="1.5"/>
  <text x="56" y="253" font-family="Arial, sans-serif" font-size="11" fill="#DC2626" font-weight="bold">78%</text>
  <text x="56" y="267" font-family="Arial, sans-serif" font-size="10" fill="#DC2626">control-</text>
  <text x="56" y="279" font-family="Arial, sans-serif" font-size="10" fill="#DC2626">lable</text>
  <!-- ── ROW 3: Unknown 9% (GRAY) ── -->
  <text x="274" y="328" font-family="Arial, sans-serif" font-size="13" fill="#475569" font-weight="bold" text-anchor="end">Unknown reason</text>
  <text x="274" y="344" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" text-anchor="end">Survey not returned</text>
  <rect x="290" y="311" width="612" height="36" rx="3" fill="#F1F5F9"/>
  <rect x="290" y="311" width="55" height="36" rx="3" fill="#94A3B8"/>
  <text x="355" y="334" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#64748B">9%</text>
  <text x="400" y="327" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8">Reduce via survey incentive (40% → 70% return rate)</text>
  <!-- ── ROW 4: Relocated 8% (GRAY) ── -->
  <text x="274" y="408" font-family="Arial, sans-serif" font-size="13" fill="#475569" font-weight="bold" text-anchor="end">Customer relocated</text>
  <text x="274" y="424" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" text-anchor="end">Moved away from franchise</text>
  <rect x="290" y="391" width="612" height="36" rx="3" fill="#F1F5F9"/>
  <rect x="290" y="391" width="48" height="36" rx="3" fill="#CBD5E1"/>
  <text x="348" y="414" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#94A3B8">8%</text>
  <text x="388" y="407" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8">Structural — not addressable</text>
  <!-- ── ROW 5: Stopped driving 5% (GRAY) ── -->
  <text x="274" y="488" font-family="Arial, sans-serif" font-size="13" fill="#475569" font-weight="bold" text-anchor="end">Stopped driving</text>
  <text x="274" y="504" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" text-anchor="end">No longer owns vehicle</text>
  <rect x="290" y="471" width="612" height="36" rx="3" fill="#F1F5F9"/>
  <rect x="290" y="471" width="30" height="36" rx="3" fill="#CBD5E1"/>
  <text x="330" y="494" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#94A3B8">5%</text>
  <text x="366" y="487" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8">Structural — not addressable</text>
  <!-- X-axis bottom line -->
  <line x1="290" y1="512" x2="902" y2="512" stroke="#E2E8F0" stroke-width="1"/>
  <!-- RIGHT PANEL — 78% summary + breakdown ─────────────────── -->
  <rect x="922" y="130" width="318" height="288" rx="4" fill="#18345E" filter="url(#deepShadow)"/>
  <text x="1081" y="168" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" fill-opacity="0.65" text-anchor="middle" letter-spacing="2">STRATEGIC SUMMARY</text>
  <text x="1081" y="240" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#F59E0B" text-anchor="middle">78%</text>
  <text x="1081" y="268" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">of customer loss is</text>
  <text x="1081" y="288" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">controllable</text>
  <line x1="942" y1="304" x2="1220" y2="304" stroke="#FFFFFF" stroke-width="0.5" stroke-opacity="0.25"/>
  <text x="1081" y="326" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF" fill-opacity="0.80" text-anchor="middle">= 52% competitor</text>
  <text x="1081" y="346" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF" fill-opacity="0.80" text-anchor="middle">+ 26% service</text>
  <text x="1081" y="378" font-family="Arial, sans-serif" font-size="11" fill="#4ADE80" font-weight="bold" text-anchor="middle">Both are addressable</text>
  <text x="1081" y="396" font-family="Arial, sans-serif" font-size="11" fill="#4ADE80" font-weight="bold" text-anchor="middle">with 5 targeted initiatives</text>
  <!-- Uncontrollable breakdown card -->
  <rect x="922" y="434" width="318" height="160" rx="4" fill="#F0F9FF" filter="url(#shadow)"/>
  <rect x="922" y="434" width="5" height="160" rx="2" fill="#005587"/>
  <text x="943" y="462" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" letter-spacing="1">UNCONTROLLABLE  (22%)</text>
  <text x="943" y="488" font-family="Arial, sans-serif" font-size="13" fill="#1E293B" font-weight="bold">Structural losses:</text>
  <text x="943" y="508" font-family="Arial, sans-serif" font-size="12" fill="#475569">Relocation (8%) + stopped driving (5%)</text>
  <text x="943" y="526" font-family="Arial, sans-serif" font-size="12" fill="#475569">= 13% genuinely unaddressable</text>
  <text x="943" y="552" font-family="Arial, sans-serif" font-size="12" fill="#005587" font-weight="bold">Unknown (9%) is reduceable</text>
  <text x="943" y="568" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Branded-pen survey incentive targets</text>
  <text x="943" y="582" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">40% → 70% questionnaire return rate</text>
  <!-- Bottom annotation -->
  <rect x="40" y="595" width="862" height="72" rx="4" fill="#F8FAFC"/>
  <rect x="40" y="595" width="5" height="72" rx="2" fill="#005587"/>
  <text x="62" y="621" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#005587">The Pareto principle at work:</text>
  <text x="62" y="641" font-family="Arial, sans-serif" font-size="13" fill="#1E293B">Two causes drive 78% of all customer loss. Effective allocation demands concentrating resources on initiatives that fix</text>
  <text x="62" y="659" font-family="Arial, sans-serif" font-size="13" fill="#1E293B">these two root causes — not spreading effort equally across all five programme initiatives.</text>
  <rect x="0" y="694" width="1280" height="26" fill="#F8FAFC"/>
  <line x1="0" y1="694" x2="1280" y2="694" stroke="#E2E8F0" stroke-width="1"/>
  <text x="40" y="711" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8">Source: Kimsoong post-purchase survey  |  Figures as % of non-returning customers</text>
  <text x="640" y="711" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">STRICTLY CONFIDENTIAL  |  NOT FOR DISTRIBUTION</text>
  <text x="1240" y="711" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" text-anchor="end">5</text>
</svg>