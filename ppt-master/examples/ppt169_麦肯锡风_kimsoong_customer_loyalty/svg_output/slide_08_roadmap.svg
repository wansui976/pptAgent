      <feFlood flood-color="#000000" flood-opacity="0.20" result="sc"/>
      <feComposite in="sc" in2="ob" operator="in" result="s"/>
      <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
