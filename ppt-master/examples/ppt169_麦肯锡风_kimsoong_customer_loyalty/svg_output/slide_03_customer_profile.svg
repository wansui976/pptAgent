<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="topGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#002A50"/>
      <stop offset="100%" stop-color="#0070C0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="5" result="ob"/>
      <feFlood flood-color="#000000" flood-opacity="0.11" result="sc"/>
      <feComposite in="sc" in2="ob" operator="in" result="s"/>
      <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="deepShadow" x="-10%" y="-10%" width="130%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="7" result="ob"/>
      <feFlood flood-color="#000000" flood-opacity="0.14" result="sc"/>
      <feComposite in="sc" in2="ob" operator="in" result="s"/>
      <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bubbleShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="3" result="ob"/>
      <feFlood flood-color="#000000" flood-opacity="0.20" result="sc"/>
      <feComposite in="sc" in2="ob" operator="in" result="s"/>
      <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1280" height="6" fill="url(#topGrad)"/>
  <text x="40" y="44" font-family="Arial, sans-serif" font-size="19" font-weight="bold" fill="#0F172A">Young, middle-income employed buyers dominate — yet only 1 in 7 ever returns for a second purchase</text>
  <rect x="40" y="56" width="1200" height="44" rx="2" fill="#18345E"/>
  <rect x="40" y="56" width="5" height="44" rx="2" fill="#38BDF8"/>
  <text x="57" y="83" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#F8FAFC">82% middle-income, 48% under 30, 75% employed — a mainstream audience highly responsive to cost-effective loyalty incentives</text>
  <!-- Grid separators -->
  <line x1="630" y1="115" x2="630" y2="688" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="40" y1="418" x2="1240" y2="418" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- ── TOP-LEFT: AGE DISTRIBUTION ─────────────────────────── -->
  <text x="40" y="131" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" letter-spacing="3">AGE DISTRIBUTION</text>
  <line x1="40" y1="140" x2="608" y2="140" stroke="#E2E8F0" stroke-width="1"/>
  <!-- bar max width = 608-200 = 408px, label x=192 end, bar start x=200 -->
  <!-- Row 1: Under 30, 48%, fill=#005587 -->
  <text x="192" y="165" font-family="Arial, sans-serif" font-size="12" fill="#1E293B" font-weight="bold" text-anchor="end">Under 30</text>
  <rect x="200" y="150" width="408" height="26" rx="3" fill="#F1F5F9"/>
  <rect x="200" y="150" width="196" height="26" rx="3" fill="#005587"/>
  <text x="209" y="168" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">48%</text>
  <text x="408" y="168" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8">Primary cohort</text>
  <!-- Row 2: 31-40, 27% -->
  <text x="192" y="207" font-family="Arial, sans-serif" font-size="12" fill="#1E293B" font-weight="bold" text-anchor="end">31 – 40</text>
  <rect x="200" y="192" width="408" height="26" rx="3" fill="#F1F5F9"/>
  <rect x="200" y="192" width="110" height="26" rx="3" fill="#0076A8"/>
  <text x="209" y="210" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">27%</text>
  <!-- Row 3: 41-50, 15% -->
  <text x="192" y="249" font-family="Arial, sans-serif" font-size="12" fill="#1E293B" font-weight="bold" text-anchor="end">41 – 50</text>
  <rect x="200" y="234" width="408" height="26" rx="3" fill="#F1F5F9"/>
  <rect x="200" y="234" width="61" height="26" rx="3" fill="#4A90A4"/>
  <text x="209" y="252" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">15%</text>
  <!-- Row 4: Over 50, 10% -->
  <text x="192" y="291" font-family="Arial, sans-serif" font-size="12" fill="#1E293B" font-weight="bold" text-anchor="end">Over 50</text>
  <rect x="200" y="276" width="408" height="26" rx="3" fill="#F1F5F9"/>
  <rect x="200" y="276" width="41" height="26" rx="3" fill="#CBD5E1"/>
  <text x="248" y="294" font-family="Arial, sans-serif" font-size="11" fill="#475569">10%</text>
  <!-- Age insight -->
  <rect x="40" y="320" width="568" height="82" rx="4" fill="#EFF6FF"/>
  <rect x="40" y="320" width="5" height="82" rx="2" fill="#005587"/>
  <text x="60" y="345" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#005587">75% of buyers are under 40</text>
  <text x="60" y="365" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">A digitally-native, value-conscious generation highly responsive</text>
  <text x="60" y="383" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">to financial loyalty incentives and convenient digital engagement.</text>
  <text x="60" y="399" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Combined under-30 + 31-40 cohorts: 75% of total customer base</text>

  <!-- ── TOP-RIGHT: INCOME DISTRIBUTION ────────────────────────── -->
  <text x="650" y="131" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" letter-spacing="3">INCOME DISTRIBUTION</text>
  <line x1="650" y1="140" x2="1240" y2="140" stroke="#E2E8F0" stroke-width="1"/>
  <!-- label x=832 end, bar start x=840, max to x=1230 = 390px -->
  <!-- Middle income 82% = 320px -->
  <text x="832" y="165" font-family="Arial, sans-serif" font-size="12" fill="#1E293B" font-weight="bold" text-anchor="end">Middle income</text>
  <rect x="840" y="150" width="390" height="26" rx="3" fill="#F1F5F9"/>
  <rect x="840" y="150" width="320" height="26" rx="3" fill="#005587"/>
  <text x="850" y="168" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">82%</text>
  <text x="1168" y="168" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8">Core addressable</text>
  <!-- Lower income 16% = 62px -->
  <text x="832" y="207" font-family="Arial, sans-serif" font-size="12" fill="#1E293B" font-weight="bold" text-anchor="end">Lower income</text>
  <rect x="840" y="192" width="390" height="26" rx="3" fill="#F1F5F9"/>
  <rect x="840" y="192" width="62" height="26" rx="3" fill="#4A90A4"/>
  <text x="850" y="210" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">16%</text>
  <!-- Higher income 5% = 20px -->
  <text x="832" y="249" font-family="Arial, sans-serif" font-size="12" fill="#1E293B" font-weight="bold" text-anchor="end">Higher income</text>
  <rect x="840" y="234" width="390" height="26" rx="3" fill="#F1F5F9"/>
  <rect x="840" y="234" width="20" height="26" rx="3" fill="#94A3B8"/>
  <text x="867" y="252" font-family="Arial, sans-serif" font-size="11" fill="#475569">5%</text>
  <!-- Income insight -->
  <rect x="650" y="278" width="590" height="124" rx="4" fill="#EFF6FF"/>
  <rect x="650" y="278" width="5" height="124" rx="2" fill="#005587"/>
  <text x="670" y="304" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#005587">Programme design implication</text>
  <text x="670" y="326" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">82% middle-income buyers are price-sensitive and value-driven.</text>
  <text x="670" y="346" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">Financial incentives (loyalty discount, trade-in) will have</text>
  <text x="670" y="366" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">disproportionate impact on this core segment's return decision.</text>
  <text x="670" y="394" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Economy = #1 customer priority  ·  Price = #2 customer priority</text>

  <!-- ── BOTTOM-LEFT: OCCUPATION ─────────────────────────────── -->
  <text x="40" y="440" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" letter-spacing="3">OCCUPATION</text>
  <line x1="40" y1="449" x2="608" y2="449" stroke="#E2E8F0" stroke-width="1"/>
  <!-- bar max width 408px, label at x=192 end, bar start x=200 -->
  <!-- Employed 75% = 306px -->
  <text x="192" y="474" font-family="Arial, sans-serif" font-size="12" fill="#1E293B" font-weight="bold" text-anchor="end">Employed</text>
  <rect x="200" y="459" width="408" height="26" rx="3" fill="#F1F5F9"/>
  <rect x="200" y="459" width="306" height="26" rx="3" fill="#005587"/>
  <text x="209" y="477" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">75%</text>
  <!-- Self-employed 15% = 61px -->
  <text x="192" y="516" font-family="Arial, sans-serif" font-size="12" fill="#1E293B" font-weight="bold" text-anchor="end">Self-employed</text>
  <rect x="200" y="501" width="408" height="26" rx="3" fill="#F1F5F9"/>
  <rect x="200" y="501" width="61" height="26" rx="3" fill="#0076A8"/>
  <text x="209" y="519" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">15%</text>
  <!-- Student 8% = 33px -->
  <text x="192" y="558" font-family="Arial, sans-serif" font-size="12" fill="#1E293B" font-weight="bold" text-anchor="end">Student</text>
  <rect x="200" y="543" width="408" height="26" rx="3" fill="#F1F5F9"/>
  <rect x="200" y="543" width="33" height="26" rx="3" fill="#4A90A4"/>
  <text x="243" y="561" font-family="Arial, sans-serif" font-size="11" fill="#475569">8%</text>
  <!-- Retired 2% = 8px -->
  <text x="192" y="600" font-family="Arial, sans-serif" font-size="12" fill="#1E293B" font-weight="bold" text-anchor="end">Retired</text>
  <rect x="200" y="585" width="408" height="26" rx="3" fill="#F1F5F9"/>
  <rect x="200" y="585" width="8" height="26" rx="3" fill="#CBD5E1"/>
  <text x="218" y="603" font-family="Arial, sans-serif" font-size="11" fill="#8898AA">2%</text>
  <!-- Occupation callout -->
  <text x="40" y="638" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">90% in employment (regular income) — predictable purchase cycle, ideal for a structured loyalty programme</text>

  <!-- ── BOTTOM-RIGHT: TOP CUSTOMER INTERESTS ────────────────── -->
  <text x="650" y="440" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" letter-spacing="3">TOP CUSTOMER INTERESTS  &amp;  PROGRAMME ALIGNMENT</text>
  <line x1="650" y1="449" x2="1240" y2="449" stroke="#E2E8F0" stroke-width="1"/>
  <!-- Interest pills / ranked list -->
  <rect x="650" y="460" width="590" height="220" rx="4" fill="#F8FAFC"/>
  <text x="670" y="485" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8" letter-spacing="1">RANKED BY CUSTOMER IMPORTANCE</text>
  <rect x="670" y="496" width="26" height="26" rx="3" fill="#005587"/>
  <text x="683" y="514" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" text-anchor="middle" font-weight="bold">1</text>
  <text x="706" y="514" font-family="Arial, sans-serif" font-size="13" fill="#1E293B" font-weight="bold">Eating &amp; drinking</text>
  <text x="900" y="514" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">→ Magazine content angle</text>
  <rect x="670" y="530" width="26" height="26" rx="3" fill="#0076A8"/>
  <text x="683" y="548" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" text-anchor="middle" font-weight="bold">2</text>
  <text x="706" y="548" font-family="Arial, sans-serif" font-size="13" fill="#1E293B" font-weight="bold">Sport</text>
  <text x="900" y="548" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">→ Magazine content angle</text>
  <rect x="670" y="564" width="26" height="26" rx="3" fill="#4A90A4"/>
  <text x="683" y="582" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" text-anchor="middle" font-weight="bold">3</text>
  <text x="706" y="582" font-family="Arial, sans-serif" font-size="13" fill="#1E293B" font-weight="bold">Travel</text>
  <text x="900" y="582" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">→ Magazine content angle</text>
  <rect x="670" y="598" width="26" height="26" rx="3" fill="#64748B"/>
  <text x="683" y="616" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" text-anchor="middle" font-weight="bold">4</text>
  <text x="706" y="616" font-family="Arial, sans-serif" font-size="13" fill="#475569">Environment</text>
  <text x="900" y="616" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">→ Kimsoong eco-car narrative</text>
  <rect x="670" y="632" width="26" height="26" rx="3" fill="#94A3B8"/>
  <text x="683" y="650" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" text-anchor="middle" font-weight="bold">5</text>
  <text x="706" y="650" font-family="Arial, sans-serif" font-size="13" fill="#475569">Health / fitness</text>
  <text x="900" y="650" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">→ Active lifestyle brand fit</text>
  <text x="670" y="680" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Interests inform magazine editorial, survey questions, and loyalty messaging</text>
  <rect x="0" y="694" width="1280" height="26" fill="#F8FAFC"/>
  <line x1="0" y1="694" x2="1280" y2="694" stroke="#E2E8F0" stroke-width="1"/>
  <text x="40" y="711" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8">Source: Kimsoong customer database survey  |  n = proprietary European franchise sample</text>
  <text x="640" y="711" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">STRICTLY CONFIDENTIAL  |  NOT FOR DISTRIBUTION</text>
  <text x="1240" y="711" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" text-anchor="end">3</text>
</svg>