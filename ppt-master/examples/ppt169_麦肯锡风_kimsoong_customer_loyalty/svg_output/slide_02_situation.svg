<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="topGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#002A50"/>
      <stop offset="100%" stop-color="#0070C0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="5" result="ob"/>
      <feFlood flood-color="#000000" flood-opacity="0.11" result="sc"/>
      <feComposite in="sc" in2="ob" operator="in" result="s"/>
      <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="deepShadow" x="-10%" y="-10%" width="130%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="7" result="ob"/>
      <feFlood flood-color="#000000" flood-opacity="0.14" result="sc"/>
      <feComposite in="sc" in2="ob" operator="in" result="s"/>
      <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bubbleShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="3" result="ob"/>
      <feFlood flood-color="#000000" flood-opacity="0.20" result="sc"/>
      <feComposite in="sc" in2="ob" operator="in" result="s"/>
      <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1280" height="6" fill="url(#topGrad)"/>
  <text x="40" y="44" font-family="Arial, sans-serif" font-size="19" font-weight="bold" fill="#0F172A">Kimsoong retains only 15% of buyers — a structural loyalty crisis threatening long-term growth</text>
  <rect x="40" y="56" width="1200" height="44" rx="2" fill="#18345E"/>
  <rect x="40" y="56" width="5" height="44" rx="2" fill="#38BDF8"/>
  <text x="57" y="83" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#F8FAFC">85% of customers never return; 78% of defections stem from competitive pricing and service failure — both directly addressable</text>
  <!-- 3 KPI cards ─────────────────────────────────────────────────────── -->
  <text x="40" y="122" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" letter-spacing="3">THREE CRITICAL METRICS</text>
  <!-- Card 1: 15% -->
  <rect x="40" y="132" width="370" height="110" rx="4" fill="#FEF2F2" filter="url(#shadow)"/>
  <rect x="40" y="132" width="5" height="110" rx="2" fill="#DC2626"/>
  <text x="68" y="168" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Repeat purchase rate</text>
  <text x="68" y="216" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#DC2626">15%</text>
  <text x="200" y="216" font-family="Arial, sans-serif" font-size="12" fill="#94A3B8">vs. target 30%</text>
  <text x="68" y="234" font-family="Arial, sans-serif" font-size="11" fill="#DC2626" font-weight="bold">Gap: −50%  |  Only 1 in 7 ever returns</text>
  <!-- Card 2: 52% -->
  <rect x="430" y="132" width="370" height="110" rx="4" fill="#FFFBEB" filter="url(#shadow)"/>
  <rect x="430" y="132" width="5" height="110" rx="2" fill="#F59E0B"/>
  <text x="458" y="168" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Lost to competitors</text>
  <text x="458" y="216" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#F59E0B">52%</text>
  <text x="590" y="216" font-family="Arial, sans-serif" font-size="12" fill="#94A3B8">of lapsed buyers</text>
  <text x="458" y="234" font-family="Arial, sans-serif" font-size="11" fill="#F59E0B" font-weight="bold">Primary defection driver — directly controllable</text>
  <!-- Card 3: 67% -->
  <rect x="820" y="132" width="420" height="110" rx="4" fill="#FEF2F2" filter="url(#shadow)"/>
  <rect x="820" y="132" width="5" height="110" rx="2" fill="#F59E0B"/>
  <text x="848" y="168" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">After-sales rated Fair or Poor</text>
  <text x="848" y="216" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#F59E0B">67%</text>
  <text x="980" y="216" font-family="Arial, sans-serif" font-size="12" fill="#94A3B8">of all customers</text>
  <text x="848" y="234" font-family="Arial, sans-serif" font-size="11" fill="#F59E0B" font-weight="bold">Drives 26% of all defection — must-fix priority</text>
  <!-- 100 buyers flow ─────────────────────────────────────────────── -->
  <text x="40" y="270" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" letter-spacing="3">FATE OF 100 KIMSOONG BUYERS — ONE PURCHASE COHORT</text>
  <!-- Stacked bar: total w=1200, each unit=12px -->
  <!-- Retained (15): x=40, w=180 -->
  <rect x="40" y="280" width="180" height="52" rx="0" fill="#005587"/>
  <text x="130" y="311" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">15</text>
  <!-- Competitor switch (52): x=220, w=624 -->
  <rect x="220" y="280" width="624" height="52" rx="0" fill="#DC2626"/>
  <text x="532" y="311" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">52</text>
  <!-- Service disappointed (26): x=844, w=312 -->
  <rect x="844" y="280" width="312" height="52" rx="0" fill="#F59E0B"/>
  <text x="1000" y="311" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">26</text>
  <!-- Other (7): x=1156, w=84 -->
  <rect x="1156" y="280" width="84" height="52" rx="0" fill="#CBD5E1"/>
  <text x="1198" y="311" font-family="Arial, sans-serif" font-size="13" fill="#475569" text-anchor="middle">7</text>
  <!-- Segment dividers -->
  <line x1="220" y1="276" x2="220" y2="336" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="844" y1="276" x2="844" y2="336" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="1156" y1="276" x2="1156" y2="336" stroke="#FFFFFF" stroke-width="1.5"/>
  <!-- Annotation labels below bar -->
  <line x1="130" y1="332" x2="130" y2="350" stroke="#94A3B8" stroke-width="1"/>
  <text x="130" y="365" font-family="Arial, sans-serif" font-size="12" fill="#005587" font-weight="bold" text-anchor="middle">Return to Kimsoong</text>
  <line x1="532" y1="332" x2="532" y2="350" stroke="#94A3B8" stroke-width="1"/>
  <text x="532" y="365" font-family="Arial, sans-serif" font-size="12" fill="#DC2626" font-weight="bold" text-anchor="middle">Bought competitor model</text>
  <text x="532" y="381" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">Initiative: loyalty discount + trade-in</text>
  <line x1="1000" y1="332" x2="1000" y2="350" stroke="#94A3B8" stroke-width="1"/>
  <text x="1000" y="365" font-family="Arial, sans-serif" font-size="12" fill="#F59E0B" font-weight="bold" text-anchor="middle">Disappointed with service</text>
  <text x="1000" y="381" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">Initiative: free 3-yr after-sales</text>
  <text x="1198" y="365" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">Other</text>
  <!-- Controllable bracket annotation -->
  <line x1="220" y1="404" x2="1155" y2="404" stroke="#DC2626" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="220,400 220,408 214,404" fill="#DC2626"/>
  <polygon points="1155,400 1155,408 1161,404" fill="#DC2626"/>
  <text x="688" y="396" font-family="Arial, sans-serif" font-size="11" fill="#DC2626" font-weight="bold" text-anchor="middle">52 + 26 = 78 customers  ·  78% controllable</text>
  <!-- Strategic insight box -->
  <rect x="40" y="424" width="1200" height="82" rx="4" fill="#F0F9FF"/>
  <rect x="40" y="424" width="5" height="82" rx="2" fill="#005587"/>
  <text x="60" y="452" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#005587">Strategic implication:</text>
  <text x="60" y="474" font-family="Arial, sans-serif" font-size="13" fill="#1E293B">78% of Kimsoong's customer loss is caused by factors the company can directly control — competitive pricing and service quality.</text>
  <text x="60" y="496" font-family="Arial, sans-serif" font-size="13" fill="#1E293B">A targeted loyalty programme addressing both can realistically double the repeat purchase rate within 12 months at low incremental cost.</text>
  <!-- Data quality note -->
  <rect x="40" y="526" width="580" height="60" rx="4" fill="#FFFBEB"/>
  <rect x="40" y="526" width="5" height="60" rx="2" fill="#F59E0B"/>
  <text x="60" y="550" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#92400E">Data quality gap:</text>
  <text x="60" y="568" font-family="Arial, sans-serif" font-size="12" fill="#475569">9% of defectors listed as "unknown" — due to low questionnaire return rate (40%).</text>
  <text x="60" y="578" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Improving survey data will reduce this blind spot.</text>
  <rect x="650" y="526" width="590" height="60" rx="4" fill="#F0FDF4"/>
  <rect x="650" y="526" width="5" height="60" rx="2" fill="#059669"/>
  <text x="670" y="550" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#065F46">Key management lever:</text>
  <text x="670" y="568" font-family="Arial, sans-serif" font-size="12" fill="#475569">Cost-effective programme — costs shared 50/50 between Head Office</text>
  <text x="670" y="582" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">and European franchises. Low incremental investment, high retention upside.</text>
  <rect x="0" y="694" width="1280" height="26" fill="#F8FAFC"/>
  <line x1="0" y1="694" x2="1280" y2="694" stroke="#E2E8F0" stroke-width="1"/>
  <text x="40" y="711" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8">Source: Kimsoong Customer Loyalty Programme Brief, November 2025</text>
  <text x="640" y="711" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">STRICTLY CONFIDENTIAL  |  NOT FOR DISTRIBUTION</text>
  <text x="1240" y="711" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" text-anchor="end">2</text>
</svg>