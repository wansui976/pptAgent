<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="topGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#002A50"/>
      <stop offset="100%" stop-color="#0070C0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="5" result="ob"/>
      <feFlood flood-color="#000000" flood-opacity="0.11" result="sc"/>
      <feComposite in="sc" in2="ob" operator="in" result="s"/>
      <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="deepShadow" x="-10%" y="-10%" width="130%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="7" result="ob"/>
      <feFlood flood-color="#000000" flood-opacity="0.14" result="sc"/>
      <feComposite in="sc" in2="ob" operator="in" result="s"/>
      <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bubbleShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="3" result="ob"/>
      <feFlood flood-color="#000000" flood-opacity="0.20" result="sc"/>
      <feComposite in="sc" in2="ob" operator="in" result="s"/>
      <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1280" height="6" fill="url(#topGrad)"/>
  <text x="40" y="44" font-family="Arial, sans-serif" font-size="19" font-weight="bold" fill="#0F172A">After-sales service is the highest-priority performance gap — high customer importance, lowest Kimsoong score</text>
  <rect x="40" y="56" width="1200" height="44" rx="2" fill="#18345E"/>
  <rect x="40" y="56" width="5" height="44" rx="2" fill="#38BDF8"/>
  <text x="57" y="83" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#F8FAFC">Reliability and price are genuine strengths to protect; after-sales service sits in the urgent 'Invest' quadrant and must be addressed first</text>
  <!-- Matrix background frame -->
  <rect x="195" y="115" width="720" height="533" rx="2" fill="#FAFAFA" stroke="#E2E8F0" stroke-width="1"/>
  <!-- FIXED Quadrant coloured fills -->
  <!-- Top-LEFT (MAINTAIN): very light grey -->
  <rect x="195" y="115" width="360" height="266" fill="#F8FAFC"/>
  <!-- Top-RIGHT (PROTECT — GREEN): light green -->
  <rect x="555" y="115" width="360" height="266" fill="#F0FDF4"/>
  <!-- Bottom-LEFT (DE-PRIORITIZE): white -->
  <rect x="195" y="381" width="360" height="267" fill="#FAFAFA"/>
  <!-- Bottom-RIGHT (INVEST/FIX — RED): light red -->
  <rect x="555" y="381" width="360" height="267" fill="#FFF1F2"/>
  <!-- Grid lines — centre dividers -->
  <line x1="555" y1="115" x2="555" y2="648" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="7,5"/>
  <line x1="195" y1="381" x2="915" y2="381" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="7,5"/>
  <!-- Quadrant labels -->
  <text x="285" y="140" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle" letter-spacing="2">MAINTAIN</text>
  <text x="715" y="140" font-family="Arial, sans-serif" font-size="10" fill="#059669" text-anchor="middle" letter-spacing="2" font-weight="bold">PROTECT  &#x2714;</text>
  <text x="285" y="638" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle" letter-spacing="2">DE-PRIORITISE</text>
  <text x="715" y="638" font-family="Arial, sans-serif" font-size="10" fill="#DC2626" text-anchor="middle" letter-spacing="2" font-weight="bold">INVEST / FIX  &#x26A0;</text>
  <!-- Axis labels -->
  <text x="555" y="672" font-family="Arial, sans-serif" font-size="11" fill="#475569" text-anchor="middle">&#x2190;  Lower Priority     CUSTOMER PRIORITY     Higher Priority  &#x2192;</text>
  <text x="168" y="381" font-family="Arial, sans-serif" font-size="11" fill="#475569" text-anchor="middle" transform="rotate(-90, 168, 381)">Worse  &#x2193;    PERFORMANCE    &#x2191;  Better</text>
  <text x="200" y="376" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8">Higher</text>
  <text x="200" y="389" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8">Perf.</text>
  <text x="200" y="480" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8">Lower</text>
  <text x="200" y="493" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8">Perf.</text>
  <!-- BUBBLES (right half = high priority) -->
  <!-- Reliability: priority #3, performance HIGH → top-right quadrant -->
  <circle cx="690" cy="218" r="34" fill="#059669" filter="url(#bubbleShadow)"/>
  <text x="690" y="214" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Reliab-</text>
  <text x="690" y="230" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">ility</text>
  <!-- Price: priority #2, performance GOOD → top-right quadrant -->
  <circle cx="755" cy="278" r="28" fill="#0076A8" filter="url(#bubbleShadow)"/>
  <text x="755" y="283" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Price</text>
  <!-- Economy: priority #1 (highest), performance MODERATE → top-right, near center -->
  <circle cx="838" cy="364" r="32" fill="#005587" filter="url(#bubbleShadow)"/>
  <text x="838" y="360" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Econ-</text>
  <text x="838" y="374" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">omy</text>
  <!-- After-sales: priority #4, performance VERY LOW → bottom-right CRITICAL -->
  <circle cx="700" cy="535" r="46" fill="#DC2626" filter="url(#bubbleShadow)"/>
  <text x="700" y="526" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">After-</text>
  <text x="700" y="542" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Sales</text>
  <text x="700" y="558" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF" fill-opacity="0.85" text-anchor="middle">Service</text>
  <!-- Annotation arrow from after-sales bubble to callout -->
  <line x1="746" y1="520" x2="956" y2="480" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- Right panel: legend + critical finding -->
  <rect x="936" y="115" width="304" height="248" rx="4" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="936" y="115" width="5" height="248" rx="2" fill="#94A3B8"/>
  <text x="958" y="146" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" letter-spacing="2">LEGEND  —  BUBBLE SIZE = RELATIVE PRIORITY</text>
  <circle cx="965" cy="188" r="18" fill="#059669"/>
  <text x="992" y="193" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">Reliability — strength</text>
  <circle cx="965" cy="236" r="14" fill="#0076A8"/>
  <text x="992" y="241" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">Price — competitive</text>
  <circle cx="965" cy="280" r="16" fill="#005587"/>
  <text x="992" y="285" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">Economy — monitor</text>
  <circle cx="965" cy="330" r="22" fill="#DC2626"/>
  <text x="992" y="335" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">After-sales — critical</text>
  <!-- Critical finding callout -->
  <rect x="936" y="380" width="304" height="262" rx="4" fill="#FFF1F2" filter="url(#shadow)"/>
  <rect x="936" y="380" width="5" height="262" rx="2" fill="#DC2626"/>
  <text x="958" y="410" font-family="Arial, sans-serif" font-size="10" fill="#DC2626" font-weight="bold" letter-spacing="2">CRITICAL FINDING</text>
  <text x="958" y="436" font-family="Arial, sans-serif" font-size="14" fill="#1E293B" font-weight="bold">After-Sales Service</text>
  <line x1="958" y1="448" x2="1228" y2="448" stroke="#F1F5F9" stroke-width="1"/>
  <text x="958" y="470" font-family="Arial, sans-serif" font-size="12" fill="#475569">Customer rank: #4 of 7</text>
  <text x="958" y="488" font-family="Arial, sans-serif" font-size="12" fill="#475569">(top 57% of priorities)</text>
  <text x="958" y="516" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#DC2626">67%</text>
  <text x="958" y="536" font-family="Arial, sans-serif" font-size="12" fill="#475569">rate it Fair or Poor</text>
  <text x="958" y="554" font-family="Arial, sans-serif" font-size="12" fill="#475569">Only 33% say Good+</text>
  <line x1="958" y1="568" x2="1228" y2="568" stroke="#F1F5F9" stroke-width="1"/>
  <text x="958" y="588" font-family="Arial, sans-serif" font-size="12" fill="#DC2626" font-weight="bold">Drives 26% of defection</text>
  <text x="958" y="606" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Initiative #1: 3-year free</text>
  <text x="958" y="621" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">after-sales service</text>
  <text x="958" y="638" font-family="Arial, sans-serif" font-size="11" fill="#059669" font-weight="bold">Must-fix priority</text>
  <rect x="0" y="694" width="1280" height="26" fill="#F8FAFC"/>
  <line x1="0" y1="694" x2="1280" y2="694" stroke="#E2E8F0" stroke-width="1"/>
  <text x="40" y="711" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8">Source: Kimsoong customer satisfaction survey  |  Priority data from post-purchase questionnaire</text>
  <text x="640" y="711" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">STRICTLY CONFIDENTIAL  |  NOT FOR DISTRIBUTION</text>
  <text x="1240" y="711" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" text-anchor="end">4</text>
</svg>