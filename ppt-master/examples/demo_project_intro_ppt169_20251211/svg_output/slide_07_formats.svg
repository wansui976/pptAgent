<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="cardShadow" x="-15%" y="-15%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.08" result="shadowColor"/>
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="accentShadow" x="-15%" y="-15%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="6" result="offsetBlur"/>
      <feFlood flood-color="#6366F1" flood-opacity="0.18" result="shadowColor"/>
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1280" height="720" fill="#FAFBFC"/>
  <rect x="0" y="0" width="1280" height="4" fill="url(#gradient1)"/>

  <!-- 页面标题 -->
  <text x="60" y="62" font-family="Microsoft YaHei, Arial, sans-serif" font-size="30" font-weight="bold" fill="#1F2937">10+ 画布格式：覆盖全场景需求</text>
  <text x="60" y="95" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#6B7280">从演示文稿到社交媒体，一套系统满足所有格式需求</text>
  <rect x="60" y="115" width="1160" height="1" fill="#E5E7EB"/>

  <!-- 左栏：演示文稿 + 社交媒体 -->
  <g transform="translate(60, 140)">
    <!-- 演示文稿 -->
    <g filter="url(#cardShadow)">
      <rect width="380" height="180" rx="16" fill="#FFFFFF"/>
    </g>
    <use data-icon="desktop" x="18" y="15" width="22" height="22" fill="#6366F1"/>
    <text x="48" y="33" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#6366F1">演示文稿</text>
    <rect x="20" y="48" width="340" height="1" fill="#E5E7EB"/>
    <g transform="translate(20, 65)">
      <rect width="160" height="90" rx="8" fill="#FAFBFC" stroke="#E5E7EB" stroke-width="1"/>
      <rect x="15" y="15" width="90" height="50" rx="4" fill="#6366F1"/>
      <text x="60" y="45" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#FFFFFF">16:9</text>
      <text x="80" y="78" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" text-anchor="middle" fill="#1F2937">PPT 16:9</text>
      <text x="125" y="35" font-family="Arial, sans-serif" font-size="9" fill="#9CA3AF">1280</text>
      <text x="125" y="48" font-family="Arial, sans-serif" font-size="9" fill="#9CA3AF">×720</text>
      <g transform="translate(180, 0)">
        <rect width="160" height="90" rx="8" fill="#FAFBFC" stroke="#E5E7EB" stroke-width="1"/>
        <rect x="25" y="15" width="55" height="42" rx="4" fill="#06B6D4"/>
        <text x="52" y="42" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#FFFFFF">4:3</text>
        <text x="80" y="78" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" text-anchor="middle" fill="#1F2937">PPT 4:3</text>
        <text x="120" y="35" font-family="Arial, sans-serif" font-size="9" fill="#9CA3AF">1024</text>
        <text x="120" y="48" font-family="Arial, sans-serif" font-size="9" fill="#9CA3AF">×768</text>
      </g>
    </g>

    <!-- 社交媒体 -->
    <g transform="translate(0, 200)">
      <g filter="url(#cardShadow)">
        <rect width="380" height="225" rx="16" fill="#FFFFFF"/>
      </g>
      <use data-icon="mobile" x="18" y="15" width="22" height="22" fill="#06B6D4"/>
      <text x="48" y="33" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#06B6D4">社交媒体</text>
      <rect x="20" y="48" width="340" height="1" fill="#E5E7EB"/>
      <g transform="translate(20, 62)">
        <rect width="105" height="125" rx="8" fill="#FAFBFC" stroke="#E5E7EB" stroke-width="1"/>
        <rect x="20" y="12" width="45" height="58" rx="4" fill="#EF4444"/>
        <text x="42" y="48" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#FFFFFF">3:4</text>
        <text x="52" y="92" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" text-anchor="middle" fill="#1F2937">小红书</text>
        <text x="52" y="108" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#9CA3AF">1242×1660</text>
        <g transform="translate(120, 0)">
          <rect width="105" height="125" rx="8" fill="#FAFBFC" stroke="#E5E7EB" stroke-width="1"/>
          <rect x="25" y="12" width="45" height="45" rx="4" fill="#10B981"/>
          <text x="47" y="40" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#FFFFFF">1:1</text>
          <text x="52" y="92" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" text-anchor="middle" fill="#1F2937">朋友圈</text>
          <text x="52" y="108" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#9CA3AF">1080×1080</text>
        </g>
        <g transform="translate(240, 0)">
          <rect width="105" height="125" rx="8" fill="#FAFBFC" stroke="#E5E7EB" stroke-width="1"/>
          <rect x="30" y="12" width="35" height="58" rx="4" fill="#8B5CF6"/>
          <text x="47" y="48" font-family="Arial, sans-serif" font-size="7" text-anchor="middle" fill="#FFFFFF">9:16</text>
          <text x="52" y="92" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#1F2937">Story</text>
          <text x="52" y="108" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#9CA3AF">1080×1920</text>
        </g>
      </g>
    </g>
  </g>

  <!-- 右上：营销物料 -->
  <g transform="translate(480, 140)">
    <g filter="url(#cardShadow)">
      <rect width="380" height="155" rx="16" fill="#FFFFFF"/>
    </g>
    <use data-icon="megaphone" x="18" y="15" width="22" height="22" fill="#10B981"/>
    <text x="48" y="33" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#10B981">营销物料</text>
    <rect x="20" y="48" width="340" height="1" fill="#E5E7EB"/>
    <g transform="translate(20, 66)" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">
      <text x="0" y="0" fill="#1F2937">• 公众号头图</text>
      <text x="145" y="0" fill="#9CA3AF" font-size="11">900×383</text>
      <text x="0" y="25" fill="#1F2937">• Banner 横幅</text>
      <text x="145" y="25" fill="#9CA3AF" font-size="11">1200×628</text>
      <text x="0" y="50" fill="#1F2937">• A4 文档</text>
      <text x="145" y="50" fill="#9CA3AF" font-size="11">595×842</text>
      <text x="210" y="0" fill="#1F2937">• 头像</text>
      <text x="290" y="0" fill="#9CA3AF" font-size="11">400×400</text>
      <text x="210" y="25" fill="#1F2937">• 名片</text>
      <text x="290" y="25" fill="#9CA3AF" font-size="11">1050×600</text>
    </g>
  </g>

  <!-- 右中：统计 -->
  <g transform="translate(480, 315)">
    <g filter="url(#accentShadow)">
      <rect width="380" height="115" rx="16" fill="url(#gradient1)"/>
    </g>
    <text x="190" y="55" font-family="Arial, sans-serif" font-size="52" font-weight="bold" text-anchor="middle" fill="#FFFFFF">10+</text>
    <text x="190" y="88" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.9">种画布格式</text>
  </g>

  <!-- 右下：特点 -->
  <g transform="translate(480, 450)">
    <g filter="url(#cardShadow)">
      <rect width="380" height="115" rx="16" fill="#FFFFFF"/>
    </g>
    <use data-icon="sparkles" x="18" y="15" width="22" height="22" fill="#6366F1"/>
    <text x="48" y="33" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#1F2937">格式特点</text>
    <rect x="20" y="48" width="340" height="1" fill="#E5E7EB"/>
    <g transform="translate(20, 66)" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">
      <use data-icon="circle-checkmark" x="-2" y="-12" width="16" height="16" fill="#10B981"/>
      <text x="20" y="0">自动适配不同比例的布局规范</text>
      <use data-icon="circle-checkmark" x="-2" y="11" width="16" height="16" fill="#10B981"/>
      <text x="20" y="23">内容区域智能调整</text>
    </g>
  </g>

  <!-- 最右：格式列表 -->
  <g transform="translate(900, 140)">
    <g filter="url(#cardShadow)">
      <rect width="320" height="425" rx="16" fill="#FFFFFF"/>
    </g>
    <use data-icon="list" x="18" y="15" width="22" height="22" fill="#1F2937"/>
    <text x="48" y="33" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#1F2937">完整格式列表</text>
    <rect x="20" y="48" width="280" height="1" fill="#E5E7EB"/>
    <g transform="translate(20, 72)" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">
      <text x="0" y="0" fill="#6366F1" font-weight="bold">演示文稿</text>
      <text x="20" y="22" fill="#6B7280">ppt169</text>
      <text x="155" y="22" fill="#9CA3AF">1280×720</text>
      <text x="20" y="44" fill="#6B7280">ppt43</text>
      <text x="155" y="44" fill="#9CA3AF">1024×768</text>
      <text x="0" y="80" fill="#06B6D4" font-weight="bold">社交媒体</text>
      <text x="20" y="102" fill="#6B7280">xiaohongshu</text>
      <text x="155" y="102" fill="#9CA3AF">1242×1660</text>
      <text x="20" y="124" fill="#6B7280">moments</text>
      <text x="155" y="124" fill="#9CA3AF">1080×1080</text>
      <text x="20" y="146" fill="#6B7280">story</text>
      <text x="155" y="146" fill="#9CA3AF">1080×1920</text>
      <text x="0" y="182" fill="#10B981" font-weight="bold">营销物料</text>
      <text x="20" y="204" fill="#6B7280">wechat</text>
      <text x="155" y="204" fill="#9CA3AF">900×383</text>
      <text x="20" y="226" fill="#6B7280">banner</text>
      <text x="155" y="226" fill="#9CA3AF">1200×628</text>
      <text x="20" y="248" fill="#6B7280">a4</text>
      <text x="155" y="248" fill="#9CA3AF">595×842</text>
      <text x="0" y="284" fill="#F59E0B" font-weight="bold">其他格式</text>
      <text x="20" y="306" fill="#6B7280">avatar</text>
      <text x="155" y="306" fill="#9CA3AF">400×400</text>
      <text x="20" y="328" fill="#6B7280">card</text>
      <text x="155" y="328" fill="#9CA3AF">1050×600</text>
    </g>
  </g>

  <!-- 页脚 -->
  <rect x="60" y="660" width="1160" height="1" fill="#E5E7EB"/>
  <text x="60" y="690" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#9CA3AF">PPT Master - 支持格式</text>
  <text x="640" y="690" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#9CA3AF">07 / 10</text>
  <text x="1220" y="690" font-family="Arial, sans-serif" font-size="12" text-anchor="end" fill="#9CA3AF">github.com/hugohe3/ppt-master</text>
</svg>
