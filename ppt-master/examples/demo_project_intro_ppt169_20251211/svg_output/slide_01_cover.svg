<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="bottomOverlay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1A2E" stop-opacity="0"/>
      <stop offset="50%" stop-color="#1A1A2E" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#1A1A2E" stop-opacity="0.88"/>
    </linearGradient>
    <linearGradient id="topOverlay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </linearGradient>
    <filter id="softShadow" x="-15%" y="-15%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.10" result="shadowColor"/>
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 全屏背景图 -->
  <image href="../images/cover_background.png" x="0" y="0" width="1280" height="720" preserveAspectRatio="xMidYMid slice"/>

  <!-- 顶部品牌色叠加 -->
  <rect x="0" y="0" width="1280" height="300" fill="url(#topOverlay)"/>

  <!-- 底部渐变叠加层 -->
  <rect x="0" y="200" width="1280" height="520" fill="url(#bottomOverlay)"/>

  <!-- 左上角装饰线 -->
  <rect x="60" y="40" width="50" height="4" rx="2" fill="#FFFFFF" fill-opacity="0.8"/>
  <rect x="60" y="52" width="30" height="4" rx="2" fill="#06B6D4" fill-opacity="0.8"/>

  <!-- 主标题 -->
  <text x="640" y="380" font-family="Microsoft YaHei, Arial, sans-serif" font-size="48" font-weight="bold" text-anchor="middle" fill="#FFFFFF">PPT Master</text>

  <!-- 副标题 -->
  <text x="640" y="430" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.92">AI 驱动的多格式 SVG 内容生成系统</text>

  <!-- 分隔装饰线 -->
  <rect x="560" y="450" width="160" height="3" rx="1.5" fill="url(#gradient1)"/>

  <!-- Tagline -->
  <text x="640" y="490" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.78">四角色 AI 协作 · 智能生成专业内容 · 纯 SVG 矢量输出</text>

  <!-- 特性标签 -->
  <g transform="translate(640, 530)">
    <rect x="-310" y="0" width="140" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.15"/>
    <use data-icon="rocket" x="-300" y="7" width="18" height="18" fill="#FFFFFF"/>
    <text x="-275" y="22" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#FFFFFF" fill-opacity="0.9">10x 效率提升</text>

    <rect x="-150" y="0" width="140" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.15"/>
    <use data-icon="palette" x="-140" y="7" width="18" height="18" fill="#FFFFFF"/>
    <text x="-115" y="22" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#FFFFFF" fill-opacity="0.9">三重设计风格</text>

    <rect x="10" y="0" width="140" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.15"/>
    <use data-icon="layers" x="20" y="7" width="18" height="18" fill="#FFFFFF"/>
    <text x="45" y="22" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#FFFFFF" fill-opacity="0.9">10+ 画布格式</text>

    <rect x="170" y="0" width="140" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.15"/>
    <use data-icon="sparkles" x="180" y="7" width="18" height="18" fill="#FFFFFF"/>
    <text x="205" y="22" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#FFFFFF" fill-opacity="0.9">640+ 矢量图标</text>
  </g>

  <!-- GitHub 地址 -->
  <text x="640" y="610" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.55">github.com/hugohe3/ppt-master</text>

  <!-- 页码 -->
  <text x="640" y="695" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.4">01 / 10</text>
</svg>
