<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="cardShadow" x="-15%" y="-15%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.08" result="shadowColor"/>
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 渐变背景 -->
  <rect width="1280" height="720" fill="url(#bgGradient)"/>

  <!-- 装饰圆 -->
  <circle cx="150" cy="150" r="200" fill="#FFFFFF" fill-opacity="0.05"/>
  <circle cx="1130" cy="570" r="250" fill="#FFFFFF" fill-opacity="0.05"/>
  <circle cx="1050" cy="120" r="100" fill="#FFFFFF" fill-opacity="0.03"/>

  <!-- 左上角装饰线 -->
  <rect x="60" y="40" width="50" height="4" rx="2" fill="#FFFFFF" fill-opacity="0.8"/>
  <rect x="60" y="52" width="30" height="4" rx="2" fill="#FFFFFF" fill-opacity="0.5"/>

  <!-- 主标题 -->
  <text x="640" y="175" font-family="Microsoft YaHei, Arial, sans-serif" font-size="44" font-weight="bold" text-anchor="middle" fill="#FFFFFF">立即开始使用 PPT Master</text>
  <text x="640" y="220" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.9">释放 AI 生产力，让内容创作更高效</text>

  <!-- 分隔装饰线 -->
  <rect x="560" y="240" width="160" height="3" rx="1.5" fill="#FFFFFF" fill-opacity="0.4"/>

  <!-- 行动号召卡片 -->
  <g transform="translate(140, 275)">
    <!-- Star -->
    <g filter="url(#cardShadow)">
      <rect width="300" height="150" rx="16" fill="#FFFFFF"/>
    </g>
    <use data-icon="star" x="136" y="22" width="28" height="28" fill="#F59E0B"/>
    <text x="150" y="82" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#1F2937">Star 支持</text>
    <text x="150" y="108" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#6B7280">github.com/hugohe3/ppt-master</text>
    <rect x="100" y="125" width="100" height="4" rx="2" fill="#F59E0B"/>

    <!-- 在线示例 -->
    <g transform="translate(340, 0)">
      <g filter="url(#cardShadow)">
        <rect width="300" height="150" rx="16" fill="#FFFFFF"/>
      </g>
      <use data-icon="desktop" x="136" y="22" width="28" height="28" fill="#06B6D4"/>
      <text x="150" y="82" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#1F2937">在线示例</text>
      <text x="150" y="108" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#6B7280">notes.36sjs.com/pages/ppt</text>
      <rect x="100" y="125" width="100" height="4" rx="2" fill="#06B6D4"/>
    </g>

    <!-- 文档 -->
    <g transform="translate(680, 0)">
      <g filter="url(#cardShadow)">
        <rect width="300" height="150" rx="16" fill="#FFFFFF"/>
      </g>
      <use data-icon="book" x="136" y="22" width="28" height="28" fill="#10B981"/>
      <text x="150" y="82" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#1F2937">完善文档</text>
      <text x="150" y="108" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" text-anchor="middle" fill="#6B7280">详细教程 · 设计指南 · 速查手册</text>
      <rect x="100" y="125" width="100" height="4" rx="2" fill="#10B981"/>
    </g>
  </g>

  <!-- 项目亮点 -->
  <g transform="translate(640, 480)" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle">
    <use data-icon="rocket" x="-320" y="-14" width="18" height="18" fill="#FFFFFF"/>
    <text x="-290" y="0">四角色 AI 协作</text>
    <use data-icon="brush" x="-20" y="-14" width="18" height="18" fill="#FFFFFF"/>
    <text x="10" y="0">三重设计风格</text>
    <use data-icon="grid" x="280" y="-14" width="18" height="18" fill="#FFFFFF"/>
    <text x="310" y="0">10+ 画布格式</text>
  </g>

  <g transform="translate(640, 515)" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#FFFFFF" fill-opacity="0.85" text-anchor="middle">
    <use data-icon="chart-bar" x="-320" y="-14" width="18" height="18" fill="#FFFFFF" fill-opacity="0.85"/>
    <text x="-290" y="0">13 种图表模板</text>
    <use data-icon="target" x="-20" y="-14" width="18" height="18" fill="#FFFFFF" fill-opacity="0.85"/>
    <text x="10" y="0">640+ 矢量图标</text>
    <use data-icon="vector-square" x="280" y="-14" width="18" height="18" fill="#FFFFFF" fill-opacity="0.85"/>
    <text x="310" y="0">纯 SVG 输出</text>
  </g>

  <!-- 底部信息 -->
  <text x="640" y="590" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.8">MIT License · Made with Love by Hugo He</text>
  <text x="640" y="618" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.6">github.com/hugohe3 · Star · Fork · Contribute</text>

  <!-- 页码 -->
  <text x="640" y="695" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.4">10 / 10</text>

  <!-- 角落装饰 -->
  <polygon points="0,720 0,660 60,720" fill="#FFFFFF" fill-opacity="0.1"/>
  <polygon points="1280,720 1280,660 1220,720" fill="#FFFFFF" fill-opacity="0.1"/>
  <polygon points="0,0 0,60 60,0" fill="#FFFFFF" fill-opacity="0.08"/>
  <polygon points="1280,0 1280,60 1220,0" fill="#FFFFFF" fill-opacity="0.08"/>
</svg>
