<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="cardShadow" x="-15%" y="-15%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.08" result="shadowColor"/>
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="accentShadow" x="-15%" y="-15%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="6" result="offsetBlur"/>
      <feFlood flood-color="#6366F1" flood-opacity="0.20" result="shadowColor"/>
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1280" height="720" fill="#FAFBFC"/>
  <rect x="0" y="0" width="1280" height="4" fill="url(#gradient1)"/>

  <!-- 页面标题 -->
  <text x="60" y="62" font-family="Microsoft YaHei, Arial, sans-serif" font-size="30" font-weight="bold" fill="#1F2937">PPT Master：AI 驱动的智能解决方案</text>
  <text x="60" y="95" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#6B7280">通过四角色 AI 协作，将 PPT 制作时间从 4-8 小时缩短至 30 分钟内</text>
  <rect x="60" y="115" width="1160" height="1" fill="#E5E7EB"/>

  <!-- Before vs After -->
  <g transform="translate(60, 145)">
    <!-- Before 卡片 -->
    <g filter="url(#cardShadow)">
      <rect width="480" height="155" rx="16" fill="#FFFFFF"/>
    </g>
    <rect x="0" y="0" width="480" height="5" rx="2.5" fill="#EF4444"/>
    <use data-icon="circle-x" x="20" y="25" width="22" height="22" fill="#EF4444"/>
    <text x="50" y="43" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#EF4444">传统方式</text>
    <rect x="20" y="55" width="440" height="1" fill="#FEE2E2"/>
    <text x="240" y="100" font-family="Arial, sans-serif" font-size="46" font-weight="bold" text-anchor="middle" fill="#EF4444">4-8 小时</text>
    <text x="240" y="130" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" text-anchor="middle" fill="#6B7280">手动设计 · 反复调整 · 效果不稳定</text>

    <!-- 箭头 -->
    <g transform="translate(500, 55)">
      <rect x="0" y="12" width="60" height="16" rx="8" fill="url(#gradient1)"/>
      <polygon points="60,5 78,20 60,35" fill="#6366F1"/>
    </g>

    <!-- After 卡片 -->
    <g transform="translate(600, 0)">
      <g filter="url(#cardShadow)">
        <rect width="480" height="155" rx="16" fill="#FFFFFF"/>
      </g>
      <rect x="0" y="0" width="480" height="5" rx="2.5" fill="#10B981"/>
      <use data-icon="circle-checkmark" x="20" y="25" width="22" height="22" fill="#10B981"/>
      <text x="50" y="43" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#10B981">PPT Master</text>
      <rect x="20" y="55" width="440" height="1" fill="#D1FAE5"/>
      <text x="240" y="100" font-family="Arial, sans-serif" font-size="46" font-weight="bold" text-anchor="middle" fill="#10B981">30 分钟</text>
      <text x="240" y="130" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" text-anchor="middle" fill="#6B7280">AI 协作 · 一键生成 · 专业品质</text>
    </g>
  </g>

  <!-- 效率提升指标 -->
  <g transform="translate(540, 320)">
    <g filter="url(#accentShadow)">
      <rect width="200" height="80" rx="16" fill="url(#gradient1)"/>
    </g>
    <text x="100" y="45" font-family="Arial, sans-serif" font-size="42" font-weight="bold" text-anchor="middle" fill="#FFFFFF">10x</text>
    <text x="100" y="68" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.9">效率提升</text>
  </g>

  <!-- 核心能力卡片 -->
  <g transform="translate(60, 430)">
    <g filter="url(#cardShadow)">
      <rect width="265" height="115" rx="12" fill="#FFFFFF"/>
    </g>
    <use data-icon="robot" x="20" y="22" width="32" height="32" fill="#6366F1"/>
    <text x="62" y="45" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#1F2937">智能内容解构</text>
    <text x="20" y="72" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#6B7280">自动分析源文档并重组为</text>
    <text x="20" y="92" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#6B7280">清晰的页面序列</text>

    <g transform="translate(290, 0)">
      <g filter="url(#cardShadow)">
        <rect width="265" height="115" rx="12" fill="#FFFFFF"/>
      </g>
      <use data-icon="brush" x="20" y="22" width="32" height="32" fill="#06B6D4"/>
      <text x="62" y="45" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#1F2937">三重设计风格</text>
      <text x="20" y="72" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#6B7280">通用灵活 / 一般咨询 /</text>
      <text x="20" y="92" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#6B7280">顶级咨询 (MBB 级)</text>
    </g>

    <g transform="translate(580, 0)">
      <g filter="url(#cardShadow)">
        <rect width="265" height="115" rx="12" fill="#FFFFFF"/>
      </g>
      <use data-icon="grid" x="20" y="22" width="32" height="32" fill="#10B981"/>
      <text x="62" y="45" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#1F2937">多格式支持</text>
      <text x="20" y="72" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#6B7280">PPT / 小红书 / 朋友圈 /</text>
      <text x="20" y="92" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#6B7280">Story 等 10+ 种格式</text>
    </g>

    <g transform="translate(870, 0)">
      <g filter="url(#cardShadow)">
        <rect width="265" height="115" rx="12" fill="#FFFFFF"/>
      </g>
      <use data-icon="vector-square" x="20" y="22" width="32" height="32" fill="#8B5CF6"/>
      <text x="62" y="45" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#1F2937">纯 SVG 输出</text>
      <text x="20" y="72" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#6B7280">高质量矢量图形，</text>
      <text x="20" y="92" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#6B7280">任意缩放不失真</text>
    </g>
  </g>

  <!-- 底部洞察 -->
  <g filter="url(#accentShadow)">
    <rect x="60" y="570" width="1160" height="50" rx="12" fill="url(#gradient1)"/>
  </g>
  <use data-icon="lightbulb" x="540" y="582" width="24" height="24" fill="#FFFFFF"/>
  <text x="572" y="602" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">核心洞察：让 AI 处理格式，人类专注内容创作</text>

  <!-- 页脚 -->
  <rect x="60" y="660" width="1160" height="1" fill="#E5E7EB"/>
  <text x="60" y="690" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#9CA3AF">PPT Master - 解决方案</text>
  <text x="640" y="690" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#9CA3AF">03 / 10</text>
  <text x="1220" y="690" font-family="Arial, sans-serif" font-size="12" text-anchor="end" fill="#9CA3AF">github.com/hugohe3/ppt-master</text>
</svg>
