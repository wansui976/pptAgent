<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="cardShadow" x="-15%" y="-15%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.08" result="shadowColor"/>
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="accentShadow" x="-15%" y="-15%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="6" result="offsetBlur"/>
      <feFlood flood-color="#6366F1" flood-opacity="0.18" result="shadowColor"/>
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1280" height="720" fill="#FAFBFC"/>
  <rect x="0" y="0" width="1280" height="4" fill="url(#gradient1)"/>

  <!-- 页面标题 -->
  <text x="60" y="62" font-family="Microsoft YaHei, Arial, sans-serif" font-size="30" font-weight="bold" fill="#1F2937">六大核心特性：全面提升内容创作效率</text>
  <text x="60" y="95" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#6B7280">从内容解构到最终输出，覆盖完整工作流程</text>
  <rect x="60" y="115" width="1160" height="1" fill="#E5E7EB"/>

  <!-- 3x2 特性卡片 -->
  <g transform="translate(60, 140)">
    <!-- 智能内容解构 -->
    <g filter="url(#cardShadow)">
      <rect width="360" height="175" rx="16" fill="#FFFFFF"/>
    </g>
    <rect x="0" y="0" width="360" height="52" rx="16" fill="#6366F1"/>
    <rect x="0" y="16" width="360" height="36" fill="#6366F1"/>
    <use data-icon="robot" x="18" y="13" width="24" height="24" fill="#FFFFFF"/>
    <text x="50" y="33" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">智能内容解构</text>
    <g transform="translate(20, 72)" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">
      <text x="0" y="0">自动分析源文档结构</text>
      <text x="0" y="24">将内容重组为清晰的页面序列</text>
      <text x="0" y="48">智能提取关键信息和数据</text>
    </g>
    <rect x="285" y="72" width="55" height="55" rx="8" fill="#F5F3FF"/>
    <text x="312" y="108" font-family="Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#6366F1">AI</text>

    <!-- 三重设计风格 -->
    <g transform="translate(390, 0)">
      <g filter="url(#cardShadow)">
        <rect width="360" height="175" rx="16" fill="#FFFFFF"/>
      </g>
      <rect x="0" y="0" width="360" height="52" rx="16" fill="#06B6D4"/>
      <rect x="0" y="16" width="360" height="36" fill="#06B6D4"/>
      <use data-icon="brush" x="18" y="13" width="24" height="24" fill="#FFFFFF"/>
      <text x="50" y="33" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">三重设计风格</text>
      <g transform="translate(20, 72)" font-family="Microsoft YaHei, Arial, sans-serif">
        <rect x="0" y="0" width="95" height="28" rx="6" fill="#E0F2FE"/>
        <text x="47" y="19" font-size="12" text-anchor="middle" fill="#06B6D4">通用灵活</text>
        <rect x="105" y="0" width="95" height="28" rx="6" fill="#E0F2FE"/>
        <text x="152" y="19" font-size="12" text-anchor="middle" fill="#06B6D4">一般咨询</text>
        <rect x="210" y="0" width="95" height="28" rx="6" fill="#6366F1"/>
        <text x="257" y="19" font-size="12" text-anchor="middle" fill="#FFFFFF">MBB 级</text>
        <text x="0" y="55" font-size="13" fill="#6B7280">适配不同场景：商务/咨询/战略</text>
      </g>
    </g>

    <!-- 多格式支持 -->
    <g transform="translate(780, 0)">
      <g filter="url(#cardShadow)">
        <rect width="360" height="175" rx="16" fill="#FFFFFF"/>
      </g>
      <rect x="0" y="0" width="360" height="52" rx="16" fill="#10B981"/>
      <rect x="0" y="16" width="360" height="36" fill="#10B981"/>
      <use data-icon="grid" x="18" y="13" width="24" height="24" fill="#FFFFFF"/>
      <text x="50" y="33" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">多格式支持</text>
      <g transform="translate(20, 70)" font-family="Microsoft YaHei, Arial, sans-serif">
        <text x="0" y="17" font-size="36" font-weight="bold" fill="#10B981">10+</text>
        <text x="75" y="5" font-size="14" fill="#1F2937">种画布格式</text>
        <text x="0" y="40" font-size="12" fill="#6B7280">PPT 16:9 · PPT 4:3 · 小红书</text>
        <text x="0" y="60" font-size="12" fill="#6B7280">朋友圈 · Story · Banner · A4</text>
      </g>
    </g>

    <!-- 数据可视化 -->
    <g transform="translate(0, 200)">
      <g filter="url(#cardShadow)">
        <rect width="360" height="175" rx="16" fill="#FFFFFF"/>
      </g>
      <rect x="0" y="0" width="360" height="52" rx="16" fill="#F59E0B"/>
      <rect x="0" y="16" width="360" height="36" fill="#F59E0B"/>
      <use data-icon="chart-bar" x="18" y="13" width="24" height="24" fill="#FFFFFF"/>
      <text x="50" y="33" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">数据可视化</text>
      <g transform="translate(20, 70)" font-family="Microsoft YaHei, Arial, sans-serif">
        <text x="0" y="17" font-size="36" font-weight="bold" fill="#F59E0B">13</text>
        <text x="42" y="5" font-size="14" fill="#1F2937">种图表模板</text>
        <text x="0" y="40" font-size="12" fill="#6B7280">KPI 卡片 · 柱状图 · 折线图</text>
        <text x="0" y="60" font-size="12" fill="#6B7280">饼图 · 矩阵图 · 时间轴</text>
      </g>
    </g>

    <!-- CRAP 原则 -->
    <g transform="translate(390, 200)">
      <g filter="url(#cardShadow)">
        <rect width="360" height="175" rx="16" fill="#FFFFFF"/>
      </g>
      <rect x="0" y="0" width="360" height="52" rx="16" fill="#EF4444"/>
      <rect x="0" y="16" width="360" height="36" fill="#EF4444"/>
      <use data-icon="target" x="18" y="13" width="24" height="24" fill="#FFFFFF"/>
      <text x="50" y="33" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">CRAP 设计原则</text>
      <g transform="translate(20, 70)" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">
        <rect x="0" y="0" width="72" height="26" rx="6" fill="#FEE2E2"/>
        <text x="36" y="17" text-anchor="middle" fill="#EF4444" font-weight="bold">C 对比</text>
        <rect x="82" y="0" width="72" height="26" rx="6" fill="#FEE2E2"/>
        <text x="118" y="17" text-anchor="middle" fill="#EF4444" font-weight="bold">R 重复</text>
        <rect x="164" y="0" width="72" height="26" rx="6" fill="#FEE2E2"/>
        <text x="200" y="17" text-anchor="middle" fill="#EF4444" font-weight="bold">A 对齐</text>
        <rect x="246" y="0" width="85" height="26" rx="6" fill="#FEE2E2"/>
        <text x="288" y="17" text-anchor="middle" fill="#EF4444" font-weight="bold">P 亲密性</text>
        <text x="0" y="52" font-size="13" fill="#6B7280">专业设计原则，提升视觉质量</text>
      </g>
    </g>

    <!-- 纯 SVG 输出 -->
    <g transform="translate(780, 200)">
      <g filter="url(#cardShadow)">
        <rect width="360" height="175" rx="16" fill="#FFFFFF"/>
      </g>
      <rect x="0" y="0" width="360" height="52" rx="16" fill="#8B5CF6"/>
      <rect x="0" y="16" width="360" height="36" fill="#8B5CF6"/>
      <use data-icon="vector-square" x="18" y="13" width="24" height="24" fill="#FFFFFF"/>
      <text x="50" y="33" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">纯 SVG 输出</text>
      <g transform="translate(20, 70)" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">
        <use data-icon="circle-checkmark" x="-2" y="-12" width="16" height="16" fill="#10B981"/>
        <text x="20" y="0">无限缩放不失真</text>
        <text x="175" y="0">
          <tspan fill="#10B981" font-weight="bold">✓</tspan> 文件体积小</text>
        <use data-icon="circle-checkmark" x="-2" y="13" width="16" height="16" fill="#10B981"/>
        <text x="20" y="25">易于编辑修改</text>
        <text x="175" y="25">
          <tspan fill="#10B981" font-weight="bold">✓</tspan> 浏览器原生支持</text>
        <use data-icon="circle-checkmark" x="-2" y="38" width="16" height="16" fill="#10B981"/>
        <text x="20" y="50">无需第三方依赖</text>
      </g>
    </g>
  </g>

  <!-- 底部总结 -->
  <g filter="url(#accentShadow)">
    <rect x="60" y="555" width="1160" height="48" rx="12" fill="url(#gradient1)"/>
  </g>
  <use data-icon="rocket" x="530" y="567" width="22" height="22" fill="#FFFFFF"/>
  <text x="560" y="586" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">完整的工具链 + 专业的设计体系 = 高效的内容创作</text>

  <!-- 页脚 -->
  <rect x="60" y="660" width="1160" height="1" fill="#E5E7EB"/>
  <text x="60" y="690" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#9CA3AF">PPT Master - 核心特性</text>
  <text x="640" y="690" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#9CA3AF">06 / 10</text>
  <text x="1220" y="690" font-family="Arial, sans-serif" font-size="12" text-anchor="end" fill="#9CA3AF">github.com/hugohe3/ppt-master</text>
</svg>
