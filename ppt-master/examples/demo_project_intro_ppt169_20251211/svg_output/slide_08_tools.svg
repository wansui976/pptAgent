<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="cardShadow" x="-15%" y="-15%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.08" result="shadowColor"/>
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="accentShadow" x="-15%" y="-15%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="6" result="offsetBlur"/>
      <feFlood flood-color="#6366F1" flood-opacity="0.18" result="shadowColor"/>
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1280" height="720" fill="#FAFBFC"/>
  <rect x="0" y="0" width="1280" height="4" fill="url(#gradient1)"/>

  <!-- 页面标题 -->
  <text x="60" y="62" font-family="Microsoft YaHei, Arial, sans-serif" font-size="30" font-weight="bold" fill="#1F2937">工具生态：完善的工具链支持</text>
  <text x="60" y="95" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#6B7280">从项目初始化到质量检查，覆盖完整开发流程</text>
  <rect x="60" y="115" width="1160" height="1" fill="#E5E7EB"/>

  <!-- 项目管理工具 -->
  <g transform="translate(60, 140)">
    <g filter="url(#cardShadow)">
      <rect width="555" height="200" rx="16" fill="#FFFFFF"/>
    </g>
    <rect x="0" y="0" width="555" height="48" rx="16" fill="#6366F1"/>
    <rect x="0" y="14" width="555" height="34" fill="#6366F1"/>
    <use data-icon="wrench" x="15" y="12" width="22" height="22" fill="#FFFFFF"/>
    <text x="45" y="30" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">项目管理工具</text>

    <g transform="translate(20, 65)">
      <rect width="245" height="52" rx="8" fill="#FAFBFC"/>
      <text x="15" y="22" font-family="monospace, Arial" font-size="11" fill="#6366F1">project_manager.py</text>
      <text x="15" y="40" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" fill="#6B7280">项目初始化 · 验证 · 信息查看</text>

      <g transform="translate(265, 0)">
        <rect width="245" height="52" rx="8" fill="#FAFBFC"/>
        <text x="15" y="22" font-family="monospace, Arial" font-size="11" fill="#6366F1">svg_quality_checker.py</text>
        <text x="15" y="40" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" fill="#6B7280">SVG 质量检查 · 规范验证</text>
      </g>
    </g>

    <g transform="translate(20, 130)">
      <rect width="245" height="52" rx="8" fill="#FAFBFC"/>
      <text x="15" y="22" font-family="monospace, Arial" font-size="11" fill="#6366F1">finalize_svg.py</text>
      <text x="15" y="40" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" fill="#6B7280">最终化处理 · 图标嵌入</text>

      <g transform="translate(265, 0)">
        <rect width="245" height="52" rx="8" fill="#FAFBFC"/>
        <text x="15" y="22" font-family="monospace, Arial" font-size="11" fill="#6366F1">svg_to_pptx.py</text>
        <text x="15" y="40" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" fill="#6B7280">PPTX 导出 · 原生形状</text>
      </g>
    </g>
  </g>

  <!-- 资源库 -->
  <g transform="translate(640, 140)">
    <g filter="url(#cardShadow)">
      <rect width="555" height="200" rx="16" fill="#FFFFFF"/>
    </g>
    <rect x="0" y="0" width="555" height="48" rx="16" fill="#06B6D4"/>
    <rect x="0" y="14" width="555" height="34" fill="#06B6D4"/>
    <use data-icon="archive-box" x="15" y="12" width="22" height="22" fill="#FFFFFF"/>
    <text x="45" y="30" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">资源库</text>

    <g transform="translate(20, 65)">
      <rect width="245" height="120" rx="12" fill="#FAFBFC"/>
      <use data-icon="palette" x="99" y="15" width="32" height="32" fill="#06B6D4"/>
      <text x="122" y="68" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#1F2937">矢量图标库</text>
      <text x="122" y="95" font-family="Arial, sans-serif" font-size="30" font-weight="bold" text-anchor="middle" fill="#06B6D4">640+</text>
      <text x="122" y="112" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" text-anchor="middle" fill="#9CA3AF">来自 SVG Repo</text>

      <g transform="translate(265, 0)">
        <rect width="245" height="120" rx="12" fill="#FAFBFC"/>
        <use data-icon="chart-bar" x="99" y="15" width="32" height="32" fill="#06B6D4"/>
        <text x="122" y="68" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#1F2937">图表模板</text>
        <text x="122" y="95" font-family="Arial, sans-serif" font-size="30" font-weight="bold" text-anchor="middle" fill="#06B6D4">13</text>
        <text x="122" y="112" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" text-anchor="middle" fill="#9CA3AF">种常用图表类型</text>
      </g>
    </g>
  </g>

  <!-- 文档中心 -->
  <g transform="translate(60, 365)">
    <g filter="url(#cardShadow)">
      <rect width="1160" height="175" rx="16" fill="#FFFFFF"/>
    </g>
    <rect x="0" y="0" width="1160" height="48" rx="16" fill="#10B981"/>
    <rect x="0" y="14" width="1160" height="34" fill="#10B981"/>
    <use data-icon="book" x="15" y="12" width="22" height="22" fill="#FFFFFF"/>
    <text x="45" y="30" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">文档中心</text>

    <g transform="translate(20, 68)">
      <rect width="175" height="82" rx="8" fill="#FAFBFC"/>
      <use data-icon="brush" x="15" y="16" width="18" height="18" fill="#6366F1"/>
      <text x="40" y="30" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold" fill="#1F2937">设计指南</text>
      <text x="15" y="50" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" fill="#6B7280">design_guidelines.md</text>
      <text x="15" y="67" font-family="Microsoft YaHei, Arial, sans-serif" font-size="9" fill="#9CA3AF">颜色/排版/布局规范</text>

      <g transform="translate(190, 0)">
        <rect width="175" height="82" rx="8" fill="#FAFBFC"/>
        <use data-icon="grid" x="15" y="16" width="18" height="18" fill="#06B6D4"/>
        <text x="40" y="30" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold" fill="#1F2937">画布格式</text>
        <text x="15" y="50" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" fill="#6B7280">canvas_formats.md</text>
        <text x="15" y="67" font-family="Microsoft YaHei, Arial, sans-serif" font-size="9" fill="#9CA3AF">10+ 种格式规范</text>
      </g>

      <g transform="translate(380, 0)">
        <rect width="175" height="82" rx="8" fill="#FAFBFC"/>
        <use data-icon="book" x="15" y="16" width="18" height="18" fill="#10B981"/>
        <text x="40" y="30" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold" fill="#1F2937">工作流教程</text>
        <text x="15" y="50" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" fill="#6B7280">workflow_tutorial.md</text>
        <text x="15" y="67" font-family="Microsoft YaHei, Arial, sans-serif" font-size="9" fill="#9CA3AF">实际案例演示</text>
      </g>

      <g transform="translate(570, 0)">
        <rect width="175" height="82" rx="8" fill="#FAFBFC"/>
        <use data-icon="bolt" x="15" y="16" width="18" height="18" fill="#F59E0B"/>
        <text x="40" y="30" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold" fill="#1F2937">快速参考</text>
        <text x="15" y="50" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" fill="#6B7280">quick_reference.md</text>
        <text x="15" y="67" font-family="Microsoft YaHei, Arial, sans-serif" font-size="9" fill="#9CA3AF">速查手册</text>
      </g>

      <g transform="translate(760, 0)">
        <rect width="175" height="82" rx="8" fill="#FAFBFC"/>
        <use data-icon="image" x="15" y="16" width="18" height="18" fill="#8B5CF6"/>
        <text x="40" y="30" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold" fill="#1F2937">图片嵌入</text>
        <text x="15" y="50" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" fill="#6B7280">svg_image_embedding.md</text>
        <text x="15" y="67" font-family="Microsoft YaHei, Arial, sans-serif" font-size="9" fill="#9CA3AF">图片处理指南</text>
      </g>

      <g transform="translate(950, 0)">
        <rect width="175" height="82" rx="8" fill="#FAFBFC"/>
        <use data-icon="cog" x="15" y="16" width="18" height="18" fill="#EF4444"/>
        <text x="40" y="30" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold" fill="#1F2937">角色定义</text>
        <text x="15" y="50" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" fill="#6B7280">roles/</text>
        <text x="15" y="67" font-family="Microsoft YaHei, Arial, sans-serif" font-size="9" fill="#9CA3AF">5 个角色文件</text>
      </g>
