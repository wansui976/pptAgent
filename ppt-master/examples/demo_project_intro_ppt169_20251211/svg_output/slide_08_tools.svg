  <!-- 底部总结 -->
  <g filter="url(#accentShadow)">
    <rect x="60" y="565" width="1160" height="48" rx="12" fill="url(#gradient1)"/>
  </g>
  <use data-icon="target" x="530" y="577" width="22" height="22" fill="#FFFFFF"/>
  <text x="560" y="596" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">开箱即用 · 文档完善 · 持续更新</text>

  <!-- 页脚 -->
  <rect x="60" y="660" width="1160" height="1" fill="#E5E7EB"/>
  <text x="60" y="690" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#9CA3AF">PPT Master - 工具生态</text>
  <text x="640" y="690" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#9CA3AF">08 / 10</text>
  <text x="1220" y="690" font-family="Arial, sans-serif" font-size="12" text-anchor="end" fill="#9CA3AF">github.com/hugohe3/ppt-master</text>
</svg>
