<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="cardShadow" x="-15%" y="-15%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.08" result="shadowColor"/>
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="accentShadow" x="-15%" y="-15%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="6" result="offsetBlur"/>
      <feFlood flood-color="#6366F1" flood-opacity="0.18" result="shadowColor"/>
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1280" height="720" fill="#FAFBFC"/>
  <rect x="0" y="0" width="1280" height="4" fill="url(#gradient1)"/>

  <!-- 页面标题 -->
  <text x="60" y="62" font-family="Microsoft YaHei, Arial, sans-serif" font-size="30" font-weight="bold" fill="#1F2937">快速开始：三步即可使用</text>
  <text x="60" y="95" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#6B7280">无需复杂配置，克隆仓库后即可开始创作</text>
  <rect x="60" y="115" width="1160" height="1" fill="#E5E7EB"/>

  <!-- 三个步骤 -->
  <g transform="translate(60, 145)">
    <!-- 步骤1: 克隆仓库 -->
    <g filter="url(#cardShadow)">
      <rect width="350" height="260" rx="16" fill="#FFFFFF"/>
    </g>
    <rect x="0" y="0" width="350" height="5" rx="2.5" fill="#6366F1"/>
    <circle cx="175" cy="48" r="28" fill="#6366F1"/>
    <text x="175" y="57" font-family="Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#FFFFFF">1</text>
    <text x="175" y="100" font-family="Microsoft YaHei, Arial, sans-serif" font-size="17" font-weight="bold" text-anchor="middle" fill="#1F2937">克隆仓库</text>

    <rect x="20" y="120" width="310" height="48" rx="8" fill="#1F2937"/>
    <text x="30" y="142" font-family="monospace, Arial" font-size="11" fill="#10B981">git clone</text>
    <text x="30" y="158" font-family="monospace, Arial" font-size="9" fill="#F59E0B">https://github.com/hugohe3/ppt-master</text>

    <text x="175" y="195" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" text-anchor="middle" fill="#6B7280">或在编辑器中直接 Clone</text>

    <rect x="20" y="212" width="310" height="28" rx="6" fill="#D1FAE5"/>
    <use data-icon="sparkles" x="30" y="218" width="16" height="16" fill="#10B981"/>
    <text x="52" y="231" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" fill="#10B981">推荐: Antigravity / Cursor / VS Code</text>

    <!-- 连接线1 -->
    <line x1="360" y1="130" x2="395" y2="130" stroke="#6366F1" stroke-width="2"/>
    <polygon points="395,123 410,130 395,137" fill="#6366F1"/>

    <!-- 步骤2: 打开 AI 聊天 -->
    <g transform="translate(405, 0)">
      <g filter="url(#cardShadow)">
        <rect width="350" height="260" rx="16" fill="#FFFFFF"/>
      </g>
      <rect x="0" y="0" width="350" height="5" rx="2.5" fill="#06B6D4"/>
      <circle cx="175" cy="48" r="28" fill="#06B6D4"/>
      <text x="175" y="57" font-family="Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#FFFFFF">2</text>
      <text x="175" y="100" font-family="Microsoft YaHei, Arial, sans-serif" font-size="17" font-weight="bold" text-anchor="middle" fill="#1F2937">打开 AI 聊天</text>

      <rect x="20" y="120" width="310" height="85" rx="8" fill="#FAFBFC"/>
      <rect x="30" y="130" width="65" height="22" rx="4" fill="#06B6D4"/>
      <text x="62" y="145" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" text-anchor="middle" fill="#FFFFFF">Chat</text>
      <text x="35" y="175" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#6B7280">打开 AI 聊天面板...</text>
      <rect x="30" y="182" width="280" height="18" rx="4" fill="#FFFFFF"/>
      <text x="40" y="195" font-family="Microsoft YaHei, Arial, sans-serif" font-size="9" fill="#9CA3AF">输入你的需求...</text>

      <text x="175" y="238" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" text-anchor="middle" fill="#6B7280">Antigravity 免费使用 Opus 4.5</text>
    </g>

    <!-- 连接线2 -->
    <line x1="765" y1="130" x2="800" y2="130" stroke="#6366F1" stroke-width="2"/>
    <polygon points="800,123 815,130 800,137" fill="#6366F1"/>

    <!-- 步骤3: 开始对话 -->
    <g transform="translate(810, 0)">
      <g filter="url(#cardShadow)">
        <rect width="350" height="260" rx="16" fill="#FFFFFF"/>
      </g>
      <rect x="0" y="0" width="350" height="5" rx="2.5" fill="#10B981"/>
      <circle cx="175" cy="48" r="28" fill="#10B981"/>
      <text x="175" y="57" font-family="Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#FFFFFF">3</text>
      <text x="175" y="100" font-family="Microsoft YaHei, Arial, sans-serif" font-size="17" font-weight="bold" text-anchor="middle" fill="#1F2937">开始对话</text>

      <rect x="20" y="120" width="310" height="85" rx="8" fill="#FAFBFC"/>
      <rect x="110" y="128" width="200" height="28" rx="6" fill="#EEF2FF"/>
      <text x="120" y="146" font-family="Microsoft YaHei, Arial, sans-serif" font-size="9" fill="#1F2937">我需要制作一份 Q3 报告 PPT</text>
      <rect x="30" y="164" width="210" height="34" rx="6" fill="#F5F3FF"/>
      <use data-icon="target" x="38" y="170" width="14" height="14" fill="#6366F1"/>
      <text x="58" y="180" font-family="Microsoft YaHei, Arial, sans-serif" font-size="8" fill="#6366F1">Strategist: 好的，让我先确认</text>
      <text x="58" y="192" font-family="Microsoft YaHei, Arial, sans-serif" font-size="8" fill="#6366F1">八项设计参数...</text>

      <text x="175" y="238" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" text-anchor="middle" fill="#6B7280">AI 自动按角色协作工作</text>
    </g>
  </g>

  <!-- 示例对话 -->
  <g transform="translate(60, 430)">
    <g filter="url(#cardShadow)">
      <rect width="1160" height="120" rx="16" fill="#FFFFFF"/>
    </g>
    <use data-icon="comment" x="20" y="18" width="22" height="22" fill="#1F2937"/>
    <text x="50" y="35" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#1F2937">示例对话</text>
    <rect x="20" y="48" width="1120" height="1" fill="#E5E7EB"/>

    <g transform="translate(20, 65)" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">
      <text x="0" y="0" fill="#06B6D4" font-weight="bold">用户:</text>
      <text x="50" y="0" fill="#1F2937">我有一份市场分析报告，需要做成 PPT</text>

      <text x="0" y="25" fill="#6366F1" font-weight="bold">Strategist:</text>
      <text x="80" y="25" fill="#1F2937">好的！在开始前，我需要确认八项内容：画布格式、页数、设计风格...</text>

      <text x="0" y="48" fill="#9CA3AF" font-size="12">→ AI 会主动提供专业建议，确认后自动进入生成流程</text>
    </g>
  </g>

  <!-- 底部总结 -->
  <g filter="url(#accentShadow)">
    <rect x="60" y="575" width="1160" height="48" rx="12" fill="url(#gradient1)"/>
  </g>
  <use data-icon="rocket" x="480" y="587" width="22" height="22" fill="#FFFFFF"/>
  <text x="510" y="606" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">零配置 · 开箱即用 · 三步开始你的 AI 内容创作之旅</text>

  <!-- 页脚 -->
  <rect x="60" y="660" width="1160" height="1" fill="#E5E7EB"/>
  <text x="60" y="690" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#9CA3AF">PPT Master - 快速开始</text>
  <text x="640" y="690" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#9CA3AF">09 / 10</text>
  <text x="1220" y="690" font-family="Arial, sans-serif" font-size="12" text-anchor="end" fill="#9CA3AF">github.com/hugohe3/ppt-master</text>
</svg>
