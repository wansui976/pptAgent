<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="cardShadow" x="-15%" y="-15%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.08" result="shadowColor"/>
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="redShadow" x="-15%" y="-15%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="5" result="offsetBlur"/>
      <feFlood flood-color="#EF4444" flood-opacity="0.15" result="shadowColor"/>
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1280" height="720" fill="#FAFBFC"/>
  <rect x="0" y="0" width="1280" height="4" fill="url(#gradient1)"/>

  <!-- 页面标题 -->
  <text x="60" y="62" font-family="Microsoft YaHei, Arial, sans-serif" font-size="30" font-weight="bold" fill="#1F2937">传统 PPT 制作：效率瓶颈与挑战</text>
  <text x="60" y="95" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#6B7280">平均每份演示文稿耗时 4-8 小时，80% 时间用于格式调整而非内容创作</text>
  <rect x="60" y="115" width="1160" height="1" fill="#E5E7EB"/>

  <!-- 四大痛点卡片 -->
  <g transform="translate(60, 145)">
    <!-- 痛点1: 耗时耗力 -->
    <g filter="url(#redShadow)">
      <rect width="265" height="220" rx="16" fill="#FFFFFF"/>
    </g>
    <rect x="0" y="0" width="265" height="6" rx="3" fill="#EF4444"/>
    <use data-icon="clock" x="108" y="30" width="48" height="48" fill="#EF4444"/>
    <text x="132" y="105" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#1F2937">耗时耗力</text>
    <text x="132" y="150" font-family="Arial, sans-serif" font-size="42" font-weight="bold" text-anchor="middle" fill="#EF4444">4-8h</text>
    <text x="132" y="175" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" text-anchor="middle" fill="#6B7280">平均制作时间</text>
    <rect x="80" y="190" width="105" height="1" fill="#E5E7EB"/>
    <text x="132" y="210" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" text-anchor="middle" fill="#9CA3AF">效率低下，拖累进度</text>

    <!-- 痛点2: 设计门槛高 -->
    <g transform="translate(290, 0)">
      <g filter="url(#redShadow)">
        <rect width="265" height="220" rx="16" fill="#FFFFFF"/>
      </g>
      <rect x="0" y="0" width="265" height="6" rx="3" fill="#EF4444"/>
      <use data-icon="palette" x="108" y="30" width="48" height="48" fill="#EF4444"/>
      <text x="132" y="105" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#1F2937">设计门槛高</text>
      <text x="132" y="150" font-family="Arial, sans-serif" font-size="42" font-weight="bold" text-anchor="middle" fill="#EF4444">70%</text>
      <text x="132" y="175" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" text-anchor="middle" fill="#6B7280">用户缺乏设计能力</text>
      <rect x="80" y="190" width="105" height="1" fill="#E5E7EB"/>
      <text x="132" y="210" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" text-anchor="middle" fill="#9CA3AF">效果参差不齐</text>
    </g>

    <!-- 痛点3: 重复劳动 -->
    <g transform="translate(580, 0)">
      <g filter="url(#redShadow)">
        <rect width="265" height="220" rx="16" fill="#FFFFFF"/>
      </g>
      <rect x="0" y="0" width="265" height="6" rx="3" fill="#EF4444"/>
      <use data-icon="arrows-repeat" x="108" y="30" width="48" height="48" fill="#EF4444"/>
      <text x="132" y="105" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#1F2937">重复劳动</text>
      <text x="132" y="150" font-family="Arial, sans-serif" font-size="42" font-weight="bold" text-anchor="middle" fill="#EF4444">80%</text>
      <text x="132" y="175" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" text-anchor="middle" fill="#6B7280">时间用于格式调整</text>
      <rect x="80" y="190" width="105" height="1" fill="#E5E7EB"/>
      <text x="132" y="210" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" text-anchor="middle" fill="#9CA3AF">每次从头开始</text>
    </g>

    <!-- 痛点4: 可视化复杂 -->
    <g transform="translate(870, 0)">
      <g filter="url(#redShadow)">
        <rect width="265" height="220" rx="16" fill="#FFFFFF"/>
      </g>
      <rect x="0" y="0" width="265" height="6" rx="3" fill="#EF4444"/>
      <use data-icon="chart-bar" x="108" y="30" width="48" height="48" fill="#EF4444"/>
      <text x="132" y="105" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#1F2937">可视化复杂</text>
      <text x="132" y="150" font-family="Arial, sans-serif" font-size="42" font-weight="bold" text-anchor="middle" fill="#EF4444">60%</text>
      <text x="132" y="175" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" text-anchor="middle" fill="#6B7280">图表制作失误率</text>
      <rect x="80" y="190" width="105" height="1" fill="#E5E7EB"/>
      <text x="132" y="210" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" text-anchor="middle" fill="#9CA3AF">一致性难保证</text>
    </g>
  </g>

  <!-- 底部总结卡片 -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="400" width="1160" height="90" rx="16" fill="#FFFFFF"/>
  </g>
  <use data-icon="lightbulb" x="85" y="425" width="36" height="36" fill="#F59E0B"/>
  <text x="135" y="440" font-family="Microsoft YaHei, Arial, sans-serif" font-size="17" font-weight="bold" fill="#1F2937">核心问题：缺乏系统化的解决方案，导致效率低、质量不稳定</text>
  <text x="135" y="468" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280">传统工具无法解决根本问题，需要一种全新的 AI 驱动方法来变革 PPT 制作流程</text>

  <!-- 引导箭头 -->
  <g transform="translate(640, 520)">
    <use data-icon="arrow-down" x="-16" y="0" width="32" height="32" fill="#6366F1"/>
    <text x="0" y="60" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#6366F1">是否有更好的解决方案？</text>
  </g>

  <!-- 页脚 -->
  <rect x="60" y="660" width="1160" height="1" fill="#E5E7EB"/>
  <text x="60" y="690" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#9CA3AF">PPT Master - 痛点分析</text>
  <text x="640" y="690" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#9CA3AF">02 / 10</text>
  <text x="1220" y="690" font-family="Arial, sans-serif" font-size="12" text-anchor="end" fill="#9CA3AF">github.com/hugohe3/ppt-master</text>
</svg>
