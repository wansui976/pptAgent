<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="cardShadow" x="-15%" y="-15%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.08" result="shadowColor"/>
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="nodeShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="3" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.10" result="shadowColor"/>
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1280" height="720" fill="#FAFBFC"/>
  <rect x="0" y="0" width="1280" height="4" fill="url(#gradient1)"/>

  <!-- 页面标题 -->
  <text x="60" y="62" font-family="Microsoft YaHei, Arial, sans-serif" font-size="30" font-weight="bold" fill="#1F2937">系统架构：四角色协作流程</text>
  <text x="60" y="95" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#6B7280">清晰的职责划分，确保每个环节高质量输出</text>
  <rect x="60" y="115" width="1160" height="1" fill="#E5E7EB"/>

  <!-- 流程图 -->
  <g transform="translate(60, 155)">
    <!-- 输入节点 -->
    <g filter="url(#nodeShadow)">
      <rect width="140" height="90" rx="12" fill="#FFFFFF"/>
    </g>
    <use data-icon="file" x="56" y="15" width="28" height="28" fill="#6B7280"/>
    <text x="70" y="63" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#1F2937">用户文档</text>
    <text x="70" y="80" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" text-anchor="middle" fill="#9CA3AF">内容输入</text>

    <!-- 箭头1 -->
    <line x1="150" y1="45" x2="200" y2="45" stroke="#6366F1" stroke-width="2"/>
    <polygon points="200,38 215,45 200,52" fill="#6366F1"/>

    <!-- Strategist -->
    <g transform="translate(225, 0)">
      <g filter="url(#nodeShadow)">
        <rect width="180" height="90" rx="12" fill="#6366F1"/>
      </g>
      <use data-icon="target" x="76" y="12" width="28" height="28" fill="#FFFFFF"/>
      <text x="90" y="58" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#FFFFFF">Strategist</text>
      <text x="90" y="76" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.8">策略规划</text>
    </g>

    <!-- 箭头2 -->
    <line x1="415" y1="45" x2="465" y2="45" stroke="#6366F1" stroke-width="2"/>
    <polygon points="465,38 480,45 465,52" fill="#6366F1"/>

    <!-- Executor -->
    <g transform="translate(490, 0)">
      <g filter="url(#nodeShadow)">
        <rect width="180" height="90" rx="12" fill="#06B6D4"/>
      </g>
      <use data-icon="cog" x="76" y="12" width="28" height="28" fill="#FFFFFF"/>
      <text x="90" y="58" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#FFFFFF">Executor</text>
      <text x="90" y="76" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.8">SVG 生成</text>
    </g>

    <!-- 箭头3 -->
    <line x1="680" y1="45" x2="730" y2="45" stroke="#6366F1" stroke-width="2"/>
    <polygon points="730,38 745,45 730,52" fill="#6366F1"/>

    <!-- Optimizer -->
    <g transform="translate(755, 0)">
      <g filter="url(#nodeShadow)">
        <rect width="180" height="90" rx="12" fill="#10B981"/>
      </g>
      <use data-icon="sparkles" x="76" y="12" width="28" height="28" fill="#FFFFFF"/>
      <text x="90" y="58" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#FFFFFF">Optimizer</text>
      <text x="90" y="76" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.8">CRAP 优化</text>
    </g>

    <!-- 箭头4 -->
    <line x1="945" y1="45" x2="995" y2="45" stroke="#10B981" stroke-width="2"/>
    <polygon points="995,38 1010,45 995,52" fill="#10B981"/>

    <!-- 输出节点 -->
    <g transform="translate(1020, 0)">
      <g filter="url(#nodeShadow)">
        <rect width="140" height="90" rx="12" fill="#FFFFFF" stroke="#10B981" stroke-width="2"/>
      </g>
      <use data-icon="image" x="56" y="15" width="28" height="28" fill="#10B981"/>
      <text x="70" y="63" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#10B981">最终 SVG</text>
      <text x="70" y="80" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" text-anchor="middle" fill="#9CA3AF">专业输出</text>
    </g>
  </g>

  <!-- 角色详情卡片 -->
  <g transform="translate(60, 290)">
    <!-- Strategist 详情 -->
    <g filter="url(#cardShadow)">
      <rect width="360" height="175" rx="12" fill="#FFFFFF"/>
    </g>
    <rect x="0" y="0" width="360" height="48" rx="12" fill="#6366F1"/>
    <rect x="0" y="14" width="360" height="34" fill="#6366F1"/>
    <use data-icon="target" x="15" y="12" width="22" height="22" fill="#FFFFFF"/>
    <text x="45" y="30" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Strategist 策略师</text>
    <g transform="translate(20, 65)" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">
      <text x="0" y="0">• 八项确认：画布/页数/风格/配色</text>
      <text x="0" y="24">• 智能内容解构与重组</text>
      <text x="0" y="48">• 生成《设计规范与内容大纲》</text>
      <text x="0" y="78" font-size="11" fill="#9CA3AF">输出：design_spec.md</text>
    </g>

    <!-- Executor 详情 -->
    <g transform="translate(400, 0)">
      <g filter="url(#cardShadow)">
        <rect width="360" height="175" rx="12" fill="#FFFFFF"/>
      </g>
      <rect x="0" y="0" width="360" height="48" rx="12" fill="#06B6D4"/>
      <rect x="0" y="14" width="360" height="34" fill="#06B6D4"/>
      <use data-icon="cog" x="15" y="12" width="22" height="22" fill="#FFFFFF"/>
      <text x="45" y="30" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Executor 执行师</text>
      <g transform="translate(20, 65)" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">
        <text x="0" y="0">• 三种风格：通用 / 咨询 / MBB 级</text>
        <text x="0" y="24">• 严格遵循设计规范执行</text>
        <text x="0" y="48">• 逐页生成高质量 SVG 代码</text>
        <text x="0" y="78" font-size="11" fill="#9CA3AF">输出：slide_*.svg</text>
      </g>
    </g>

    <!-- Optimizer 详情 -->
    <g transform="translate(800, 0)">
      <g filter="url(#cardShadow)">
        <rect width="360" height="175" rx="12" fill="#FFFFFF"/>
      </g>
      <rect x="0" y="0" width="360" height="48" rx="12" fill="#10B981"/>
      <rect x="0" y="14" width="360" height="34" fill="#10B981"/>
      <use data-icon="sparkles" x="15" y="12" width="22" height="22" fill="#FFFFFF"/>
      <text x="45" y="30" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Optimizer 优化师</text>
      <g transform="translate(20, 65)" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">
        <text x="0" y="0">• CRAP 设计原则优化</text>
        <text x="0" y="24">• 对齐 / 对比 / 重复 / 亲密性</text>
        <text x="0" y="48">• 提升视觉质量（可选步骤）</text>
        <text x="0" y="78" font-size="11" fill="#9CA3AF">输出：yh_slide_*.svg</text>
      </g>
    </g>
  </g>

  <!-- 底部提示 -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="495" width="1160" height="50" rx="12" fill="#FFFFFF"/>
  </g>
  <use data-icon="badge-check" x="540" y="507" width="24" height="24" fill="#6366F1"/>
  <text x="572" y="527" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#6B7280">专业分工 + 迭代优化 = 高质量输出保障</text>

  <!-- 页脚 -->
  <rect x="60" y="660" width="1160" height="1" fill="#E5E7EB"/>
  <text x="60" y="690" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#9CA3AF">PPT Master - 系统架构</text>
  <text x="640" y="690" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#9CA3AF">04 / 10</text>
  <text x="1220" y="690" font-family="Arial, sans-serif" font-size="12" text-anchor="end" fill="#9CA3AF">github.com/hugohe3/ppt-master</text>
</svg>
