<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="levelGradient1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#34D399"/>
    </linearGradient>
    <linearGradient id="levelGradient2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4A90D9"/>
      <stop offset="100%" style="stop-color:#60A5FA"/>
    </linearGradient>
    <linearGradient id="levelGradient3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D97757"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
</defs>
  
  <!-- 背景 -->
  <rect width="1280" height="720" fill="#FFFFFF"/>
  
  <!-- 顶部强调条 -->
  <rect x="0" y="0" width="1280" height="6" fill="#D97757"/>
  
  <!-- 页面标签 -->
  <text x="60" y="55" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#D97757" letter-spacing="1">
    DECISION MATRIX
  </text>
  
  <!-- 页面标题 -->
  <text x="60" y="100" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#1A1A2E">
    复杂度递增原则：从简单开始，按需升级
  </text>
  
  <!-- 左侧：层级流程图 -->
  <g transform="translate(60, 150)">
    
    <!-- Level 1: 单一 LLM 调用 -->
    <rect x="0" y="0" width="500" height="100" rx="12" fill="url(#levelGradient1)" fill-opacity="0.15" stroke="#10B981" stroke-width="2"/>
    <circle cx="50" cy="50" r="30" fill="#10B981"/>
    <text x="50" y="57" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">1</text>
    
    <text x="100" y="40" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1A1A2E">
      单一 LLM 调用 + 优化
    </text>
    <text x="100" y="65" font-family="Arial, sans-serif" font-size="15" fill="#64748B">
      检索增强 (RAG) + 上下文示例
    </text>
    <text x="100" y="88" font-family="Arial, sans-serif" font-size="13" fill="#10B981" font-weight="600">
      ✓ 推荐起点 — 许多应用足以满足需求
    </text>
    
    <!-- 箭头 1 -->
    <g transform="translate(250, 105)">
      <line x1="0" y1="0" x2="0" y2="35" stroke="#64748B" stroke-width="2" stroke-dasharray="4,2"/>
      <polygon points="0,45 -6,35 6,35" fill="#64748B"/>
      <text x="20" y="28" font-family="Arial, sans-serif" font-size="12" fill="#64748B">不足时</text>
    </g>
    
    <!-- Level 2: Workflows -->
    <rect x="0" y="160" width="500" height="100" rx="12" fill="url(#levelGradient2)" fill-opacity="0.15" stroke="#4A90D9" stroke-width="2"/>
    <circle cx="50" cy="50" r="30" fill="#4A90D9" transform="translate(0, 160)"/>
    <text x="50" y="217" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">2</text>
    
    <text x="100" y="200" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1A1A2E">
      Workflows
    </text>
    <text x="100" y="225" font-family="Arial, sans-serif" font-size="15" fill="#64748B">
      预定义路径编排 (Chaining, Routing, Parallelization...)
    </text>
    <text x="100" y="248" font-family="Arial, sans-serif" font-size="13" fill="#4A90D9" font-weight="600">
      ◆ 可预测、一致性高、适合明确任务
    </text>
    
    <!-- 箭头 2 -->
    <g transform="translate(250, 265)">
      <line x1="0" y1="0" x2="0" y2="35" stroke="#64748B" stroke-width="2" stroke-dasharray="4,2"/>
      <polygon points="0,45 -6,35 6,35" fill="#64748B"/>
      <text x="20" y="28" font-family="Arial, sans-serif" font-size="12" fill="#64748B">不足时</text>
    </g>
    
    <!-- Level 3: Agents -->
    <rect x="0" y="320" width="500" height="100" rx="12" fill="url(#levelGradient3)" fill-opacity="0.15" stroke="#D97757" stroke-width="2"/>
    <circle cx="50" cy="370" r="30" fill="#D97757"/>
    <text x="50" y="377" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">3</text>
    
    <text x="100" y="360" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1A1A2E">
      Autonomous Agents
    </text>
    <text x="100" y="385" font-family="Arial, sans-serif" font-size="15" fill="#64748B">
      LLM 动态决策、自主规划与执行
    </text>
    <text x="100" y="408" font-family="Arial, sans-serif" font-size="13" fill="#D97757" font-weight="600">
      ⚡ 灵活强大，但成本高、需防护
    </text>
    
    <!-- 复杂度指示条 -->
    <g transform="translate(520, 40)">
      <rect x="0" y="0" width="30" height="340" rx="15" fill="#F1F5F9"/>
      <rect x="0" y="280" width="30" height="60" rx="15" fill="#10B981"/>
      <rect x="0" y="150" width="30" height="130" rx="0" fill="#4A90D9"/>
      <rect x="0" y="0" width="30" height="150" rx="15" fill="#D97757"/>
      <rect x="0" y="150" width="30" height="130" rx="0" fill="#4A90D9"/>
      
      <text x="15" y="370" font-family="Arial, sans-serif" font-size="11" fill="#64748B" text-anchor="middle" transform="rotate(-90, 15, 370)">
        简单
      </text>
      <text x="15" y="-20" font-family="Arial, sans-serif" font-size="11" fill="#64748B" text-anchor="middle" transform="rotate(-90, 15, -20)">
        复杂
      </text>
    </g>
  </g>
  
  <!-- 右侧：权衡提示卡片 -->
  <g transform="translate(680, 150)">
    <!-- Warning 卡片 -->
    <rect x="0" y="0" width="540" height="180" rx="12" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
    
    <circle cx="40" cy="40" r="24" fill="#F59E0B"/>
    <use data-icon="triangle-exclamation" x="22" y="22" width="36" height="36" fill="#FFFFFF"/>
    
    <text x="80" y="38" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#92400E">
      关键权衡
    </text>
    <text x="80" y="58" font-family="Arial, sans-serif" font-size="14" fill="#92400E">
      Trade-offs to Consider
    </text>
    
    <line x1="20" y1="80" x2="520" y2="80" stroke="#F59E0B" stroke-opacity="0.3" stroke-width="1"/>
    
    <text x="30" y="110" font-family="Arial, sans-serif" font-size="16" fill="#1A1A2E">
      <tspan x="30" dy="0">• Agent 系统以</tspan>
      <tspan font-weight="bold" fill="#D97757"> 延迟 </tspan>
      <tspan>和</tspan>
      <tspan font-weight="bold" fill="#D97757"> 成本 </tspan>
      <tspan>换取更好的任务表现</tspan>
    </text>
    <text x="30" y="138" font-family="Arial, sans-serif" font-size="16" fill="#1A1A2E">
      <tspan x="30" dy="0">• 错误可能</tspan>
      <tspan font-weight="bold" fill="#EF4444">复合累积</tspan>
      <tspan>，需要广泛测试与防护</tspan>
    </text>
    <text x="30" y="166" font-family="Arial, sans-serif" font-size="16" fill="#1A1A2E">
      • 评估这种权衡何时有意义
    </text>
    
    <!-- Success 卡片 -->
    <rect x="0" y="210" width="540" height="160" rx="12" fill="#D1FAE5" stroke="#10B981" stroke-width="1"/>
    
    <circle cx="40" cy="40" r="24" fill="#10B981" transform="translate(0, 210)"/>
    <use data-icon="circle-checkmark" x="22" y="232" width="36" height="36" fill="#FFFFFF"/>
    
    <text x="80" y="248" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#065F46">
      最佳实践
    </text>
    <text x="80" y="268" font-family="Arial, sans-serif" font-size="14" fill="#065F46">
      Best Practice
    </text>
    
    <line x1="20" y1="290" x2="520" y2="290" stroke="#10B981" stroke-opacity="0.3" stroke-width="1"/>
    
    <text x="30" y="320" font-family="Arial, sans-serif" font-size="16" fill="#1A1A2E">
      <tspan x="30" dy="0">✓ 从</tspan>
      <tspan font-weight="bold" fill="#10B981">简单 prompt</tspan>
      <tspan>开始</tspan>
    </text>
    <text x="30" y="348" font-family="Arial, sans-serif" font-size="16" fill="#1A1A2E">
      ✓ 用全面评估优化
    </text>
    
    <!-- 引用框 -->
    <rect x="0" y="400" width="540" height="70" rx="12" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="0" y="400" width="6" height="70" rx="3" fill="#4A90D9"/>
    
    <text x="25" y="430" font-family="Arial, sans-serif" font-size="15" fill="#64748B" font-style="italic">
      "许多应用只需优化单一 LLM 调用 + 检索
    </text>
    <text x="25" y="455" font-family="Arial, sans-serif" font-size="15" fill="#64748B" font-style="italic">
      即可满足需求。"
    </text>
  </g>
  
  <!-- 底部页码 -->
  <text x="640" y="680" font-family="Arial, sans-serif" font-size="14" fill="#64748B" text-anchor="middle">
    5 / 15
  </text>
  
</svg>
