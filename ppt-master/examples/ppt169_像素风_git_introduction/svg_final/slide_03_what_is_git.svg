    <text x="30" y="50" font-family="Consolas, monospace" font-size="28" font-weight="bold" fill="#FFFFFF" id="text9">
      Git = 版本控制系统 (VCS)
    </text>
    <text x="30" y="85" font-family="-apple-system, Microsoft YaHei, sans-serif" font-size="18" fill="#8B949E" id="text10">
