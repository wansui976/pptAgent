    <text x="30" y="35" font-family="Consolas, monospace" font-size="16" fill="#00D4FF" id="text21">// Git 官方定义</text>
    <text font-size="18" font-family="-apple-system, Microsoft YaHei, sans-serif" fill="#E6EDF3" x="30" y="75"><tspan>"Git is a </tspan><tspan fill="#39FF14">free and open source</tspan><tspan fill="#FF2E97">distributed version control system</tspan><tspan>"</tspan></text><text font-size="18" font-family="-apple-system, Microsoft YaHei, sans-serif" fill="#E6EDF3" x="30" y="105"><tspan>"designed to handle everything from </tspan><tspan fill="#FFD700">small to very large projects</tspan><tspan>"</tspan></text><text x="30" y="135" font-family="-apple-system, Microsoft YaHei, sans-serif" font-size="16" fill="#8B949E" id="text29">
